<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мессенджер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; height: 100vh; }
        
        .login-screen { position: fixed; top:0; left:0; right:0; bottom:0; background: linear-gradient(135deg,#667eea,#764ba2); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: white; padding: 40px; border-radius: 20px; width: 350px; text-align: center; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; }
        .login-box button { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 10px; cursor: pointer; }
        .tab { display: inline-block; width: 50%; padding: 10px; cursor: pointer; }
        .tab.active { border-bottom: 2px solid #667eea; color: #667eea; }
        .form { display: none; }
        .form.active { display: block; }
        .error { color: red; margin-top: 10px; }
        
        .app { display: flex; height: 100vh; }
        @media (max-width: 768px) { .app { flex-direction: column; } .sidebar { width: 100%; max-height: 40%; } }
        
        .sidebar { width: 300px; background: #16213e; color: white; display: flex; flex-direction: column; }
        .user-header { padding: 15px; background: #0f3460; display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; cursor: pointer; border: 2px solid #667eea; }
        .user-info { flex: 1; }
        .user-name { font-size: 16px; font-weight: bold; }
        .logout-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
        
        .users-list { padding: 15px; flex: 1; overflow-y: auto; }
        .user-item { padding: 12px; margin: 5px 0; background: #0f3460; border-radius: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .user-item:hover { background: #1a1a4e; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .status-online { background: #4CAF50; }
        .status-offline { background: #666; }
        
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #f5f5f5; }
        .chat-header { background: white; padding: 15px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 70%; padding: 10px 15px; border-radius: 15px; }
        .message.own { background: #667eea; color: white; align-self: flex-end; }
        .message.other { background: white; align-self: flex-start; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .message-text { word-wrap: break-word; }
        .message-time { font-size: 10px; margin-top: 5px; opacity: 0.7; }
        .file-attachment { display: flex; align-items: center; gap: 8px; padding: 5px; background: rgba(0,0,0,0.05); border-radius: 8px; cursor: pointer; }
        .message-image { max-width: 200px; max-height: 200px; border-radius: 10px; cursor: pointer; }
        .typing { padding: 8px 15px; font-size: 12px; color: #666; font-style: italic; background: white; }
        
        .input-area { display: flex; padding: 15px; background: white; gap: 10px; border-top: 1px solid #ddd; }
        .input-area input { flex: 1; padding: 10px; border: 2px solid #ddd; border-radius: 25px; }
        .input-area button { padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 25px; cursor: pointer; }
        .icon-btn { background: none; border: none; font-size: 20px; cursor: pointer; padding: 5px; }
        
        .image-modal { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .image-modal.active { display: flex; }
        .image-modal img { max-width: 90%; max-height: 90%; }
        .close-image { position: absolute; top: 20px; right: 20px; background: white; width: 40px; height: 40px; border-radius: 50%; border: none; font-size: 20px; cursor: pointer; }
        
        .hidden { display: none; }
        .no-chat { display: flex; align-items: center; justify-content: center; height: 100%; color: #999; }
    </style>
</head>
<body>
    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <h1>💬 Мессенджер</h1>
            <div><div class="tab active" onclick="showTab('login')">Вход</div><div class="tab" onclick="showTab('register')">Регистрация</div></div>
            <div id="loginForm" class="form active">
                <input type="text" id="loginUsername" placeholder="Никнейм">
                <input type="password" id="loginPassword" placeholder="Пароль">
                <button onclick="login()">Войти</button>
                <div id="loginError" class="error"></div>
            </div>
            <div id="registerForm" class="form">
                <input type="text" id="regUsername" placeholder="Никнейм">
                <input type="password" id="regPassword" placeholder="Пароль">
                <input type="text" id="inviteCode" placeholder="Код: FRIEND2024">
                <button onclick="register()">Зарегистрироваться</button>
                <div id="regError" class="error"></div>
            </div>
        </div>
    </div>

    <div id="app" class="app hidden">
        <div class="sidebar">
            <div class="user-header">
                <img id="myAvatar" class="user-avatar" src="/avatars/default.png" onclick="document.getElementById('avatarInput').click()">
                <div class="user-info"><div class="user-name" id="myName"></div><div id="myStatus">🟢 Онлайн</div></div>
                <button class="logout-btn" onclick="logout()">🚪</button>
            </div>
            <input type="file" id="avatarInput" style="display:none" accept="image/*" onchange="uploadAvatar(this)">
            <div class="users-list">
                <h4>👥 Пользователи</h4>
                <div id="usersContainer"></div>
            </div>
        </div>
        
        <div class="chat-area">
            <div class="chat-header">
                <div class="chat-with" id="chatWith">💬 Выберите пользователя</div>
                <button class="call-btn" onclick="startCall()" style="display:none" id="callBtn">🎤 Позвонить</button>
            </div>
            <div id="messagesArea" class="messages"><div class="no-chat">👈 Нажмите на пользователя</div></div>
            <div id="typingIndicator" class="typing"></div>
            <div class="input-area">
                <button class="icon-btn" onclick="document.getElementById('fileInput').click()">📎</button>
                <input type="file" id="fileInput" style="display:none" onchange="uploadFile(this)">
                <input type="text" id="messageInput" placeholder="Сообщение..." disabled>
                <button onclick="sendMessage()" id="sendBtn" disabled>📤</button>
            </div>
        </div>
    </div>

    <div id="imageModal" class="image-modal">
        <button class="close-image" onclick="closeImageViewer()">✖</button>
        <img id="viewImage" src="">
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket, currentUser, currentFriend = null;
        let typingTimeout;
        
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
            if (tab === 'login') {
                document.querySelector('.tab').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
        }
        
        async function register() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const inviteCode = document.getElementById('inviteCode').value.trim();
            
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, inviteCode })
            });
            const data = await res.json();
            if (data.error) document.getElementById('regError').innerText = data.error;
            else { alert('Регистрация успешна!'); showTab('login'); }
        }
        
        async function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (data.error) document.getElementById('loginError').innerText = data.error;
            else {
                currentUser = data;
                document.getElementById('myName').innerText = data.username;
                if (data.avatar) document.getElementById('myAvatar').src = data.avatar + '?t=' + Date.now();
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                
                connectSocket();
                loadUsers();
            }
        }
        
        function logout() { location.reload(); }
        
        async function uploadAvatar(input) {
            const file = input.files[0];
            const formData = new FormData();
            formData.append('avatar', file);
            formData.append('userId', currentUser.userId);
            
            const res = await fetch('/api/upload-avatar', { method: 'POST', body: formData });
            const data = await res.json();
            if (data.success) {
                document.getElementById('myAvatar').src = data.avatar + '?t=' + Date.now();
            }
        }
        
        async function uploadFile(input) {
            const file = input.files[0];
            if (!file || !currentFriend) return;
            
            const formData = new FormData();
            formData.append('file', file);
            const res = await fetch('/api/upload-file', { method: 'POST', body: formData });
            const data = await res.json();
            if (data.success && socket) {
                socket.emit('message', { to: currentFriend.id, file: data.url, text: null });
                addMessageToChat(null, data.url, data.name, new Date().toLocaleTimeString(), true);
            }
            input.value = '';
        }
        
        async function loadUsers() {
            const res = await fetch(`/api/users/${currentUser.userId}`);
            const data = await res.json();
            const container = document.getElementById('usersContainer');
            if (data.users.length === 0) {
                container.innerHTML = '<div style="padding:20px;text-align:center;opacity:0.6">Нет других пользователей</div>';
            } else {
                container.innerHTML = data.users.map(u => `
                    <div class="user-item" onclick="selectUser('${u.id}', '${u.username}')">
                        <div>
                            <span class="status-dot ${u.online ? 'status-online' : 'status-offline'}"></span>
                            ${u.username}
                        </div>
                    </div>
                `).join('');
            }
        }
        
        function selectUser(userId, username) {
            currentFriend = { id: userId, username };
            document.getElementById('chatWith').innerHTML = `💬 Чат с ${username}`;
            document.getElementById('callBtn').style.display = 'block';
            document.getElementById('messageInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('messagesArea').innerHTML = '';
            loadMessages();
        }
        
        async function loadMessages() {
            if (!currentFriend) return;
            const res = await fetch(`/api/messages/${currentUser.userId}/${currentFriend.id}`);
            const data = await res.json();
            const container = document.getElementById('messagesArea');
            container.innerHTML = '';
            if (data.messages.length === 0) {
                container.innerHTML = '<div class="no-chat">💬 Напишите первое сообщение!</div>';
            } else {
                data.messages.forEach(msg => {
                    const isOwn = msg.from_id === currentUser.userId;
                    addMessageToChat(msg.text, msg.file, null, msg.time, isOwn);
                });
            }
            scrollToBottom();
        }
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentFriend || !socket) return;
            
            socket.emit('message', { to: currentFriend.id, text, file: null });
            addMessageToChat(text, null, null, new Date().toLocaleTimeString(), true);
            input.value = '';
        }
        
        function addMessageToChat(text, fileUrl, fileName, time, isOwn) {
            const container = document.getElementById('messagesArea');
            if (container.querySelector('.no-chat')) container.innerHTML = '';
            
            const div = document.createElement('div');
            div.className = `message ${isOwn ? 'own' : 'other'}`;
            
            let content = '';
            if (text) {
                content = `<div class="message-text">${escapeHtml(text)}</div>`;
            } else if (fileUrl) {
                if (fileUrl.match(/\.(jpg|jpeg|png|gif|webp)$/i)) {
                    content = `<img src="${fileUrl}" class="message-image" onclick="openImage('${fileUrl}')">`;
                } else {
                    content = `<div class="file-attachment" onclick="window.open('${fileUrl}')">📎 ${fileName || 'Файл'}</div>`;
                }
            }
            
            div.innerHTML = `${content}<div class="message-time">${time}</div>`;
            container.appendChild(div);
            scrollToBottom();
        }
        
        function openImage(url) {
            document.getElementById('viewImage').src = url;
            document.getElementById('imageModal').classList.add('active');
        }
        
        function closeImageViewer() {
            document.getElementById('imageModal').classList.remove('active');
        }
        
        function scrollToBottom() {
            const container = document.getElementById('messagesArea');
            container.scrollTop = container.scrollHeight;
        }
        
        function startCall() {
            if (!currentFriend) return;
            alert(`Звонок ${currentFriend.username}... (функция в разработке)`);
        }
        
        function connectSocket() {
            socket = io();
            socket.emit('login', { userId: currentUser.userId, username: currentUser.username });
            
            socket.on('new-message', (data) => {
                if (currentFriend && data.from === currentFriend.id) {
                    addMessageToChat(data.text, data.file, null, data.time, false);
                }
            });
            
            socket.on('message-sent', (data) => {
                // уже добавили локально
            });
            
            socket.on('typing', (data) => {
                document.getElementById('typingIndicator').innerHTML = `${data.from} печатает...`;
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => document.getElementById('typingIndicator').innerHTML = '', 2000);
            });
            
            socket.on('online-list', () => {
                loadUsers();
            });
        }
        
        document.getElementById('messageInput').addEventListener('input', () => {
            if (socket && currentFriend) {
                socket.emit('typing', { to: currentFriend.id, name: currentUser.username });
            }
        });
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>

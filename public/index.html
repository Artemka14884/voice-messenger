<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мессенджер - Тёмная тема + Звонки</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ТЕМЫ */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            transition: all 0.3s ease;
        }

        /* Тёмная тема (по умолчанию) */
        body.dark {
            background: #1a1a2e;
            color: #fff;
        }
        body.dark .sidebar { background: #16213e; }
        body.dark .user-info { background: #0f3460; }
        body.dark .user-item { background: #0f3460; }
        body.dark .chat-area { background: #1a1a2e; }
        body.dark .chat-header { background: #16213e; color: #fff; border-bottom-color: #0f3460; }
        body.dark .message.other { background: #0f3460; color: #fff; }
        body.dark .input-area { background: #16213e; border-top-color: #0f3460; }
        body.dark .input-area input { background: #0f3460; color: #fff; border-color: #1a1a2e; }

        /* Светлая тема */
        body.light {
            background: #f0f2f5;
            color: #1a1a2e;
        }
        body.light .sidebar { background: #fff; }
        body.light .user-info { background: #667eea; color: #fff; }
        body.light .user-item { background: #f0f2f5; color: #1a1a2e; }
        body.light .chat-area { background: #fff; }
        body.light .chat-header { background: #fff; color: #1a1a2e; border-bottom-color: #e0e0e0; }
        body.light .message.other { background: #f0f2f5; color: #1a1a2e; }
        body.light .input-area { background: #fff; border-top-color: #e0e0e0; }
        body.light .input-area input { background: #f0f2f5; color: #1a1a2e; border-color: #e0e0e0; }

        /* Синяя тема */
        body.blue {
            background: #0d47a1;
            color: #fff;
        }
        body.blue .sidebar { background: #1565c0; }
        body.blue .user-info { background: #0d47a1; }
        body.blue .user-item { background: #1565c0; }
        body.blue .chat-area { background: #0d47a1; }
        body.blue .chat-header { background: #1565c0; color: #fff; }
        body.blue .message.other { background: #1565c0; color: #fff; }
        body.blue .input-area { background: #1565c0; }
        body.blue .input-area input { background: #0d47a1; color: #fff; border-color: #1565c0; }

        /* Логин */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        .login-box h1 { margin-bottom: 10px; color: #333; }
        .login-box input {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }
        .login-box button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .error { color: red; margin-top: 10px; }

        /* Основной интерфейс */
        .app { display: flex; height: 100vh; }
        .sidebar { width: 320px; display: flex; flex-direction: column; }
        .user-info { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .theme-selector { display: flex; gap: 8px; }
        .theme-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .theme-btn:hover { transform: scale(1.1); }
        .theme-dark { background: #1a1a2e; }
        .theme-light { background: #f0f2f5; }
        .theme-blue { background: #0d47a1; }
        
        .online-users { flex: 1; overflow-y: auto; padding: 15px; }
        .user-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            margin: 5px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .user-item:hover { opacity: 0.8; }
        .call-buttons { display: flex; gap: 5px; }
        .call-btn {
            background: #2196F3;
            border: none;
            color: white;
            padding: 5px 8px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        .chat-header { padding: 15px 20px; border-bottom: 1px solid; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 70%; padding: 10px 15px; border-radius: 15px; }
        .message.own { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); align-self: flex-end; }
        .message.other { align-self: flex-start; }
        .message-sender { font-size: 11px; font-weight: bold; margin-bottom: 5px; }
        .message-time { font-size: 10px; margin-top: 5px; opacity: 0.7; }
        .typing-indicator { padding: 10px 20px; font-size: 12px; opacity: 0.7; font-style: italic; min-height: 40px; }
        .input-area { display: flex; padding: 20px; gap: 10px; }
        .input-area input { flex: 1; padding: 12px; border: none; border-radius: 25px; font-size: 14px; }
        .input-area button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }
        .hidden { display: none !important; }

        /* Видео модалка */
        .video-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            display: none;
            flex-direction: column;
        }
        .video-modal.active { display: flex; }
        .video-container { flex: 1; display: flex; justify-content: center; align-items: center; gap: 20px; padding: 20px; }
        .video-box { width: 45%; min-width: 300px; background: #000; border-radius: 10px; overflow: hidden; position: relative; }
        .video-box video { width: 100%; height: auto; }
        .video-label { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.6); color: white; padding: 5px 10px; border-radius: 5px; font-size: 12px; }
        .call-controls { display: flex; justify-content: center; gap: 20px; padding: 20px; }
        .call-controls button { width: 60px; height: 60px; border-radius: 50%; border: none; cursor: pointer; font-size: 24px; }
        .call-controls .end-call { background: #f44336; color: white; }
    </style>
</head>
<body class="dark">
    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <h1>🎥 Мессенджер</h1>
            <p>С тёмной темой и звонками</p>
            <input type="text" id="usernameInput" placeholder="Никнейм" maxlength="20">
            <button onclick="login()">Войти</button>
            <div id="loginError" class="error"></div>
        </div>
    </div>

    <div id="mainApp" class="app hidden">
        <div class="sidebar">
            <div class="user-info">
                <div>
                    <h3 id="myUsername"></h3>
                    <p style="font-size: 12px; opacity: 0.8;">🟢 Онлайн</p>
                </div>
                <div class="theme-selector">
                    <div class="theme-btn theme-dark" onclick="changeTheme('dark')" title="Тёмная"></div>
                    <div class="theme-btn theme-light" onclick="changeTheme('light')" title="Светлая"></div>
                    <div class="theme-btn theme-blue" onclick="changeTheme('blue')" title="Синяя"></div>
                </div>
            </div>
            <div class="online-users">
                <h4>👥 Пользователи онлайн</h4>
                <div id="usersList"></div>
            </div>
        </div>

        <div class="chat-area">
            <div class="chat-header">
                <h2 id="chatTitle">💬 Выберите собеседника</h2>
            </div>
            <div id="messages" class="messages"></div>
            <div id="typingIndicator" class="typing-indicator"></div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Введите сообщение..." disabled onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()" disabled id="sendBtn">📤 Отправить</button>
            </div>
        </div>
    </div>

    <div id="videoModal" class="video-modal">
        <div class="video-container">
            <div class="video-box">
                <video id="localVideo" autoplay muted playsinline></video>
                <div class="video-label">Вы</div>
            </div>
            <div class="video-box">
                <video id="remoteVideo" autoplay playsinline></video>
                <div class="video-label" id="remoteLabel">Собеседник</div>
            </div>
        </div>
        <div class="call-controls">
            <button onclick="toggleMicrophone()">🎤</button>
            <button onclick="toggleCamera()">📷</button>
            <button class="end-call" onclick="endCall()">📞</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket, currentUser, currentChatUser, peerConnection, localStream, currentCallType, typingTimeout;
        
        // Конфигурация для звонков с TURN серверами
        const configuration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
                { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
                { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' }
            ]
        };

        // Смена темы
        async function changeTheme(theme) {
            document.body.className = theme;
            if (currentUser) {
                await fetch('/api/update-theme', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: currentUser.userId, theme })
                });
            }
        }

        async function login() {
            const username = document.getElementById('usernameInput').value.trim();
            if (!username || username.length < 2) {
                document.getElementById('loginError').textContent = 'Ник должен быть минимум 2 символа';
                return;
            }
            
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username })
            });
            
            const data = await res.json();
            if (data.error) {
                document.getElementById('loginError').textContent = data.error;
            } else {
                currentUser = data;
                document.getElementById('myUsername').textContent = data.username;
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                connectSocket();
            }
        }

        function connectSocket() {
            socket = io();
            socket.emit('user-online', { userId: currentUser.userId });
            
            socket.on('users-list', (users) => {
                const container = document.getElementById('usersList');
                const otherUsers = users.filter(u => u.id !== currentUser.userId);
                container.innerHTML = otherUsers.map(user => `
                    <div class="user-item">
                        <div onclick="selectUser('${user.id}', '${user.username}')">${user.username} ${user.online ? '🟢' : '⚫'}</div>
                        <div class="call-buttons">
                            <button class="call-btn" onclick="event.stopPropagation(); startCall('${user.id}', 'audio')">🎤</button>
                            <button class="call-btn" onclick="event.stopPropagation(); startCall('${user.id}', 'video')">📹</button>
                        </div>
                    </div>
                `).join('');
            });
            
            socket.on('new-message', (message) => {
                if (currentChatUser && message.fromId === currentChatUser.id) {
                    addMessage(false, message.text, message.time);
                }
            });
            
            socket.on('user-typing', (data) => {
                if (currentChatUser && data.fromId === currentChatUser.id) {
                    document.getElementById('typingIndicator').textContent = `${data.fromName || 'Собеседник'} печатает...`;
                    setTimeout(() => document.getElementById('typingIndicator').textContent = '', 2000);
                }
            });
            
            // ЗВОНКИ
            socket.on('incoming-call', async (data) => {
                if (confirm(`${data.fromName} звонит вам! Принять?`)) {
                    currentChatUser = { id: data.fromId, username: data.fromName };
                    await startLocalStream(data.type);
                    await createPeerConnection();
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
                    const answer = await peerConnection.createAnswer();
                    await peerConnection.setLocalDescription(answer);
                    socket.emit('answer-call', { toUserId: data.fromId, answer: answer });
                    document.getElementById('videoModal').classList.add('active');
                    document.getElementById('remoteLabel').textContent = data.fromName;
                } else {
                    socket.emit('end-call', { toUserId: data.fromId });
                }
            });
            
            socket.on('call-answered', async (data) => {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
                document.getElementById('videoModal').classList.add('active');
            });
            
            socket.on('ice-candidate', async (data) => {
                if (peerConnection) {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                }
            });
            
            socket.on('call-ended', () => endCall());
        }

        function selectUser(userId, username) {
            currentChatUser = { id: userId, username: username };
            document.getElementById('chatTitle').innerHTML = `💬 Чат с ${username}`;
            document.getElementById('messageInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('messages').innerHTML = '';
            loadMessages();
        }

        async function loadMessages() {
            if (!currentChatUser) return;
            const res = await fetch(`/api/messages/${currentUser.userId}/${currentChatUser.id}`);
            const data = await res.json();
            data.messages.forEach(msg => {
                addMessage(msg.fromId === currentUser.userId, msg.text, msg.time);
            });
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (text && currentChatUser && socket) {
                socket.emit('private-message', { toUserId: currentChatUser.id, message: text });
                addMessage(true, text, new Date().toLocaleTimeString());
                input.value = '';
            }
        }

        function addMessage(isOwn, text, time) {
            const messagesDiv = document.getElementById('messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isOwn ? 'own' : 'other'}`;
            msgDiv.innerHTML = `<div class="message-sender">${isOwn ? 'Вы' : currentChatUser?.username}</div><div>${escapeHtml(text)}</div><div class="message-time">${time}</div>`;
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // ЗВОНКИ
        async function startCall(toUserId, type) {
            currentCallType = type;
            await startLocalStream(type);
            await createPeerConnection();
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            socket.emit('call-user', { toUserId: toUserId, offer: offer, type: type });
        }
        
        async function startLocalStream(type) {
            if (localStream) localStream.getTracks().forEach(track => track.stop());
            try {
                if (type === 'video') {
                    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                } else {
                    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                }
                const localVideo = document.getElementById('localVideo');
                if (localVideo && type === 'video') localVideo.srcObject = localStream;
            } catch (error) {
                alert('Не удалось получить доступ к камере/микрофону. Разрешите доступ в браузере.');
            }
        }
        
        async function createPeerConnection() {
            peerConnection = new RTCPeerConnection(configuration);
            if (localStream) localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            peerConnection.ontrack = (event) => { document.getElementById('remoteVideo').srcObject = event.streams[0]; };
            peerConnection.onicecandidate = (event) => {
                if (event.candidate && currentChatUser) {
                    socket.emit('ice-candidate', { toUserId: currentChatUser.id, candidate: event.candidate });
                }
            };
        }
        
        function endCall() {
            if (localStream) { localStream.getTracks().forEach(track => track.stop()); localStream = null; }
            if (peerConnection) { peerConnection.close(); peerConnection = null; }
            document.getElementById('videoModal').classList.remove('hidden');
            document.getElementById('videoModal').classList.remove('active');
            if (currentChatUser) socket.emit('end-call', { toUserId: currentChatUser.id });
        }
        
        function toggleMicrophone() {
            if (localStream) { const track = localStream.getAudioTracks()[0]; if (track) track.enabled = !track.enabled; }
        }
        
        function toggleCamera() {
            if (localStream) { const track = localStream.getVideoTracks()[0]; if (track) track.enabled = !track.enabled; }
        }
        
        document.getElementById('messageInput').addEventListener('input', () => {
            if (socket && currentChatUser) socket.emit('typing', { toUserId: currentChatUser.id });
        });
        
        function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
    </script>
</body>
</html>

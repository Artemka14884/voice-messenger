<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Мессенджер - Онлайн игры</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; height: 100vh; overflow: hidden; }
        
        .login-screen { position: fixed; top:0; left:0; right:0; bottom:0; background: linear-gradient(135deg,#667eea,#764ba2); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: white; padding: 40px; border-radius: 20px; width: 400px; text-align: center; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; }
        .login-box button { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 10px; cursor: pointer; }
        .tab { display: inline-block; width: 50%; padding: 10px; cursor: pointer; }
        .tab.active { border-bottom: 2px solid #667eea; color: #667eea; }
        .form { display: none; }
        .form.active { display: block; }
        .error { color: red; margin-top: 10px; }
        
        .captcha-container { background: #f0f0f0; padding: 15px; border-radius: 10px; margin: 15px 0; text-align: center; }
        .captcha-code { font-size: 28px; font-weight: bold; letter-spacing: 8px; background: #fff; padding: 10px; border-radius: 8px; font-family: monospace; }
        .captcha-input { width: 100%; padding: 10px; margin-top: 10px; border: 2px solid #ddd; border-radius: 8px; text-align: center; }
        
        .app { display: flex; height: 100vh; }
        @media (max-width: 768px) { .app { flex-direction: column; } .sidebar { width: 100%; max-height: 40%; } }
        
        .sidebar { width: 300px; background: #16213e; color: white; display: flex; flex-direction: column; }
        .user-header { padding: 15px; background: #0f3460; display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; cursor: pointer; border: 2px solid #667eea; }
        .user-info { flex: 1; }
        .user-name { font-size: 16px; font-weight: bold; }
        .logout-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
        
        .nav-tabs { display: flex; background: #0f3460; padding: 5px; gap: 5px; }
        .nav-tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; border-radius: 10px; font-size: 14px; }
        .nav-tab.active { background: #667eea; }
        .panel { display: none; padding: 15px; flex: 1; overflow-y: auto; }
        .panel.active { display: block; }
        
        .user-item { padding: 12px; margin: 5px 0; background: #0f3460; border-radius: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .user-item:hover { background: #1a1a4e; }
        .online-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; background: #4CAF50; }
        .call-btn { padding: 5px 8px; background: #2196F3; border: none; border-radius: 15px; color: white; cursor: pointer; font-size: 11px; margin: 0 2px; }
        .game-btn { background: #FF9800; }
        
        .invite-link { background: #0f3460; padding: 10px; border-radius: 10px; margin-bottom: 15px; text-align: center; font-size: 12px; }
        .invite-link button { background: #4CAF50; border: none; padding: 5px 10px; border-radius: 5px; color: white; cursor: pointer; margin-top: 5px; }
        
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #f5f5f5; }
        .chat-header { background: white; padding: 15px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 70%; padding: 10px 15px; border-radius: 15px; }
        .message.own { background: #667eea; color: white; align-self: flex-end; }
        .message.other { background: white; align-self: flex-start; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .message-text { word-wrap: break-word; }
        .message-time { font-size: 10px; margin-top: 5px; opacity: 0.7; }
        .message-sender { font-size: 11px; font-weight: bold; margin-bottom: 3px; display: flex; align-items: center; gap: 5px; }
        .sender-avatar { width: 20px; height: 20px; border-radius: 50%; object-fit: cover; }
        
        .file-attachment { display: flex; align-items: center; gap: 8px; padding: 5px; background: rgba(0,0,0,0.05); border-radius: 8px; cursor: pointer; }
        .message-image { max-width: 200px; max-height: 200px; border-radius: 10px; cursor: pointer; }
        .voice-message { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .voice-play { width: 30px; height: 30px; border-radius: 50%; background: rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; }
        
        .typing { padding: 8px 15px; font-size: 12px; color: #666; font-style: italic; background: white; }
        .input-area { display: flex; padding: 15px; background: white; gap: 10px; border-top: 1px solid #ddd; flex-wrap: wrap; }
        .input-main { display: flex; flex: 1; gap: 10px; align-items: center; }
        .input-area input { flex: 1; padding: 10px; border: 2px solid #ddd; border-radius: 25px; }
        .input-area button { padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 25px; cursor: pointer; }
        .icon-btn { background: none; border: none; font-size: 20px; cursor: pointer; padding: 5px; border-radius: 50%; }
        .recording { background: #f44336; color: white; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        .call-modal { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; flex-direction: column; z-index: 2000; }
        .call-modal.active { display: flex; }
        .call-card { background: #1a1a2e; border-radius: 40px; padding: 40px; width: 350px; text-align: center; color: white; }
        .caller-name { font-size: 28px; margin-bottom: 10px; }
        .call-status { font-size: 14px; margin-bottom: 30px; }
        .call-actions { display: flex; justify-content: center; gap: 30px; }
        .call-action { width: 60px; height: 60px; border-radius: 50%; border: none; font-size: 28px; cursor: pointer; }
        .accept { background: #4CAF50; color: white; }
        .decline { background: #f44336; color: white; }
        .minimize { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.2); width: 40px; height: 40px; border-radius: 50%; border: none; color: white; font-size: 18px; cursor: pointer; }
        
        .video-container { display: flex; gap: 20px; margin-bottom: 20px; justify-content: center; }
        .video-box { width: 45%; min-width: 200px; background: #000; border-radius: 10px; overflow: hidden; }
        .video-box video { width: 100%; }
        
        .game-modal { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; flex-direction: column; z-index: 2500; }
        .game-modal.active { display: flex; }
        .game-container { background: #1a1a2e; border-radius: 20px; padding: 20px; text-align: center; }
        canvas { background: #000; border-radius: 10px; cursor: none; }
        .game-controls { margin-top: 15px; display: flex; gap: 20px; justify-content: center; }
        .game-btn-close { padding: 10px 20px; background: #4CAF50; border: none; border-radius: 10px; color: white; cursor: pointer; }
        
        .image-modal { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 3000; }
        .image-modal.active { display: flex; }
        .image-modal img { max-width: 90%; max-height: 90%; }
        .close-image { position: absolute; top: 20px; right: 20px; background: white; width: 40px; height: 40px; border-radius: 50%; border: none; font-size: 20px; cursor: pointer; }
        
        .hidden { display: none; }
        .no-chat { display: flex; align-items: center; justify-content: center; height: 100%; color: #999; text-align: center; padding: 20px; }
        
        .game-list { display: flex; gap: 15px; flex-wrap: wrap; margin-top: 15px; }
        .game-card { background: #0f3460; border-radius: 15px; padding: 20px; text-align: center; cursor: pointer; flex: 1; min-width: 120px; transition: transform 0.2s; }
        .game-card:hover { transform: scale(1.05); background: #1a1a4e; }
        .game-card .emoji { font-size: 48px; margin-bottom: 10px; }
        .game-card .title { font-weight: bold; margin-bottom: 5px; }
        .game-card .desc { font-size: 11px; opacity: 0.7; }
    </style>
</head>
<body>
    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <h1>💬 Мессенджер + Игры</h1>
            <div><div class="tab active" onclick="showTab('login')">Вход</div><div class="tab" onclick="showTab('register')">Регистрация</div></div>
            
            <div id="loginForm" class="form active">
                <input type="text" id="loginUsername" placeholder="Никнейм">
                <input type="password" id="loginPassword" placeholder="Пароль">
                <button onclick="login()">Войти</button>
                <div id="loginError" class="error"></div>
            </div>
            
            <div id="registerForm" class="form">
                <input type="text" id="regUsername" placeholder="Никнейм (3+ символов)">
                <input type="password" id="regPassword" placeholder="Пароль (4+ символов)">
                <input type="text" id="inviteCode" placeholder="Код дружбы" value="FRIEND2024">
                <div class="captcha-container">
                    <div class="captcha-code" id="captchaCode"></div>
                    <input type="text" id="captchaInput" class="captcha-input" placeholder="Введите код" maxlength="6">
                    <button type="button" onclick="generateCaptcha()" style="background:none;border:none;cursor:pointer;margin-top:5px">🔄</button>
                </div>
                <button onclick="register()">Зарегистрироваться</button>
                <div id="regError" class="error"></div>
            </div>
        </div>
    </div>

    <div id="app" class="app hidden">
        <div class="sidebar">
            <div class="user-header">
                <img id="myAvatar" class="user-avatar" src="/avatars/default.png" onclick="document.getElementById('avatarInput').click()">
                <div class="user-info">
                    <div class="user-name" id="myName"></div>
                    <div>🟢 Онлайн</div>
                </div>
                <button class="logout-btn" onclick="logout()">🚪</button>
            </div>
            <input type="file" id="avatarInput" style="display:none" accept="image/*" onchange="uploadAvatar(this)">
            
            <div class="nav-tabs">
                <div class="nav-tab active" onclick="switchPanel('chats')">💬 Чаты</div>
                <div class="nav-tab" onclick="switchPanel('games')">🎮 Игры</div>
            </div>
            
            <div id="chatsPanel" class="panel active">
                <div class="invite-link">
                    🔗 Код: <strong>FRIEND2024</strong><br>
                    <button onclick="copyInvite()">📋 Копировать ссылку</button>
                </div>
                <div id="usersContainer"></div>
                <div style="margin-top:10px; display:flex; gap:8px">
                    <input type="text" id="friendName" placeholder="Ник друга" style="flex:1; padding:8px; border-radius:10px; border:none">
                    <button onclick="addFriend()" style="background:#4CAF50; border:none; border-radius:10px; padding:8px 15px; color:white">➕</button>
                </div>
            </div>
            
            <div id="gamesPanel" class="panel">
                <div class="game-list">
                    <div class="game-card" onclick="openGame('pingpong')">
                        <div class="emoji">🏓</div>
                        <div class="title">Пинг-Понг</div>
                        <div class="desc">Играй с другом</div>
                    </div>
                    <div class="game-card" onclick="openGame('snake')">
                        <div class="emoji">🐍</div>
                        <div class="title">Змейка</div>
                        <div class="desc">Одиночная игра</div>
                    </div>
                    <div class="game-card" onclick="openGame('tetris')">
                        <div class="emoji">🧩</div>
                        <div class="title">Тетрис</div>
                        <div class="desc">Одиночная игра</div>
                    </div>
                    <div class="game-card" onclick="openGame('tic-tac-toe')">
                        <div class="emoji">❌⭕</div>
                        <div class="title">Крестики-Нолики</div>
                        <div class="desc">Играй с другом</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="chat-area">
            <div class="chat-header">
                <div id="chatWith">💬 Выберите чат</div>
                <div id="callBtns" style="display:none">
                    <button class="call-btn" onclick="startCall('audio')">🎤</button>
                    <button class="call-btn" onclick="startCall('video')">📹</button>
                    <button class="call-btn game-btn" onclick="inviteToGame()">🎮</button>
                </div>
            </div>
            <div id="messagesArea" class="messages"><div class="no-chat">👈 Нажмите на чат</div></div>
            <div id="typingIndicator" class="typing"></div>
            <div class="input-area">
                <div class="input-main">
                    <button class="icon-btn" onclick="document.getElementById('fileInput').click()">📎</button>
                    <input type="file" id="fileInput" style="display:none" onchange="uploadFile(this)">
                    <button class="icon-btn" id="voiceRecordBtn" onclick="startVoiceRecording()">🎤</button>
                    <input type="text" id="messageInput" placeholder="Сообщение..." disabled>
                    <button onclick="sendMessage()" id="sendBtn" disabled>📤</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Игровое окно -->
    <div id="gameModal" class="game-modal">
        <div class="game-container">
            <canvas id="gameCanvas" width="600" height="400"></canvas>
            <div class="game-controls">
                <button class="game-btn-close" onclick="closeGame()">Закрыть</button>
            </div>
        </div>
    </div>

    <div id="callModal" class="call-modal">
        <button class="minimize" onclick="minimizeCall()">🗕</button>
        <div class="call-card">
            <div class="caller-name" id="callerName"></div>
            <div class="call-status" id="callStatus"></div>
            <div id="videoContainer" class="video-container" style="display:none">
                <div class="video-box"><video id="localVideo" autoplay muted playsinline></video><div class="video-label">Вы</div></div>
                <div class="video-box"><video id="remoteVideo" autoplay playsinline></video><div class="video-label">Собеседник</div></div>
            </div>
            <div id="callActions" class="call-actions">
                <button class="call-action accept" onclick="acceptCall()">✅</button>
                <button class="call-action decline" onclick="declineCall()">❌</button>
            </div>
            <div id="callControls" class="call-actions" style="display:none">
                <button class="call-action" onclick="toggleMic()">🎤</button>
                <button class="call-action" onclick="toggleVideo()">📷</button>
                <button class="call-action end" onclick="endCall()">📞</button>
            </div>
        </div>
    </div>

    <div id="imageModal" class="image-modal">
        <button class="close-image" onclick="closeImageViewer()">✖</button>
        <img id="viewImage" src="">
    </div>

    <audio id="audioPlayer"></audio>
    <audio id="ringtone" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" preload="auto"></audio>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket, currentUser, currentFriend = null;
        let typingTimeout;
        let peerConnection, localStream, currentCall = null;
        let mediaRecorder, audioChunks = [], isRecording = false;
        let currentCaptcha = "";
        
        // Игра
        let gameActive = false;
        let gameCanvas, gameCtx;
        let gameType = null;
        let gameRoomId = null;
        let gameOpponent = null;
        let gamePaddleY = 150;
        let gameInviteSent = false;
        let gameBall = { x: 300, y: 200, vx: 3, vy: 2 };
        let gamePaddleRight = 150;
        let gameScores = { me: 0, opponent: 0 };
        
        // Змейка
        let snakeGame = null;
        let tetrisGame = null;
        let ticTacToeGame = null;
        
        const config = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
                { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' }
            ]
        };
        
        function generateCaptcha() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ0123456789';
            let captcha = '';
            for (let i = 0; i < 6; i++) captcha += chars[Math.floor(Math.random() * chars.length)];
            currentCaptcha = captcha;
            const el = document.getElementById('captchaCode');
            if (el) el.innerHTML = captcha;
        }
        
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
            if (tab === 'login') {
                document.querySelector('.tab').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('registerForm').classList.add('active');
                generateCaptcha();
            }
        }
        
        function switchPanel(panel) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            if (panel === 'chats') {
                document.querySelector('.nav-tab').classList.add('active');
                document.getElementById('chatsPanel').classList.add('active');
                loadUsers();
            } else {
                document.querySelectorAll('.nav-tab')[1].classList.add('active');
                document.getElementById('gamesPanel').classList.add('active');
            }
        }
        
        async function register() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const inviteCode = document.getElementById('inviteCode').value.trim();
            const captchaInput = document.getElementById('captchaInput').value.trim().toUpperCase();
            
            if (!captchaInput || captchaInput !== currentCaptcha) {
                document.getElementById('regError').innerText = 'Неверный код!';
                generateCaptcha();
                document.getElementById('captchaInput').value = '';
                return;
            }
            
            const res = await fetch('/api/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password, inviteCode }) });
            const data = await res.json();
            if (data.error) document.getElementById('regError').innerText = data.error;
            else { alert('Регистрация успешна! Войдите.'); showTab('login'); }
        }
        
        async function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
            const data = await res.json();
            if (data.error) document.getElementById('loginError').innerText = data.error;
            else {
                currentUser = data;
                document.getElementById('myName').innerText = data.username;
                if (data.avatar) document.getElementById('myAvatar').src = data.avatar + '?t=' + Date.now();
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                connectSocket();
                loadUsers();
            }
        }
        
        function logout() { location.reload(); }
        function copyInvite() { navigator.clipboard.writeText(window.location.href); alert('Ссылка скопирована!'); }
        
        async function uploadAvatar(input) {
            const file = input.files[0];
            const formData = new FormData();
            formData.append('avatar', file);
            formData.append('userId', currentUser.userId);
            const res = await fetch('/api/upload-avatar', { method: 'POST', body: formData });
            const data = await res.json();
            if (data.success) document.getElementById('myAvatar').src = data.avatar + '?t=' + Date.now();
        }
        
        async function addFriend() {
            const username = document.getElementById('friendName').value.trim();
            if (!username) return;
            alert(`Заявка отправлена ${username}`);
            document.getElementById('friendName').value = '';
        }
        
        async function loadUsers() {
            const res = await fetch(`/api/users/${currentUser.userId}`);
            const data = await res.json();
            const container = document.getElementById('usersContainer');
            if (!data.users || data.users.length === 0) {
                container.innerHTML = '<div style="padding:20px;text-align:center;opacity:0.6">Нет пользователей</div>';
            } else {
                container.innerHTML = data.users.map(u => `
                    <div class="user-item" onclick="selectUser('${u.id}', '${u.username}')">
                        <div><span class="online-dot"></span>${u.username}</div>
                        <div>
                            <button class="call-btn" onclick="event.stopPropagation();startCallTo('${u.id}', '${u.username}', 'audio')">🎤</button>
                            <button class="call-btn" onclick="event.stopPropagation();startCallTo('${u.id}', '${u.username}', 'video')">📹</button>
                            <button class="call-btn game-btn" onclick="event.stopPropagation();inviteToGameUser('${u.id}', '${u.username}')">🎮</button>
                        </div>
                    </div>
                `).join('');
            }
        }
        
        function selectUser(userId, username) {
            currentFriend = { id: userId, username };
            document.getElementById('chatWith').innerHTML = `💬 Чат с ${username}`;
            document.getElementById('callBtns').style.display = 'flex';
            document.getElementById('messageInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('messagesArea').innerHTML = '';
            loadMessages();
        }
        
        async function loadMessages() {
            if (!currentFriend) return;
            const res = await fetch(`/api/messages/${currentUser.userId}/${currentFriend.id}`);
            const data = await res.json();
            const container = document.getElementById('messagesArea');
            container.innerHTML = '';
            if (!data.messages || data.messages.length === 0) {
                container.innerHTML = '<div class="no-chat">💬 Напишите первое сообщение!</div>';
            } else {
                data.messages.forEach(msg => {
                    const isOwn = msg.from_id === currentUser.userId;
                    addMessageToChat(msg.text, msg.file, msg.voice, msg.time, isOwn);
                });
            }
            scrollToBottom();
        }
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentFriend || !socket) return;
            
            socket.emit('message', { to: currentFriend.id, text });
            addMessageToChat(text, null, null, new Date().toLocaleTimeString(), true);
            input.value = '';
        }
        
        function addMessageToChat(text, fileUrl, voiceUrl, time, isOwn) {
            const container = document.getElementById('messagesArea');
            if (container.querySelector('.no-chat')) container.innerHTML = '';
            const div = document.createElement('div');
            div.className = `message ${isOwn ? 'own' : 'other'}`;
            
            let content = '';
            if (text) content = `<div class="message-text">${escapeHtml(text)}</div>`;
            else if (voiceUrl) content = `<div class="voice-message" onclick="playVoice('${voiceUrl}')"><div class="voice-play">🔊</div><span>Голосовое</span></div>`;
            else if (fileUrl) {
                if (fileUrl.match(/\.(jpg|jpeg|png|gif|webp)$/i)) {
                    content = `<img src="${fileUrl}" class="message-image" onclick="openImage('${fileUrl}')">`;
                } else {
                    content = `<div class="file-attachment" onclick="window.open('${fileUrl}')">📎 Файл</div>`;
                }
            }
            
            div.innerHTML = `${content}<div class="message-time">${time}</div>`;
            container.appendChild(div);
            scrollToBottom();
        }
        
        async function uploadFile(input) {
            const file = input.files[0];
            if (!file || !currentFriend) return;
            
            const btn = document.getElementById('fileBtn');
            btn.innerHTML = '⏳';
            const formData = new FormData();
            formData.append('file', file);
            const res = await fetch('/api/upload-file', { method: 'POST', body: formData });
            btn.innerHTML = '📎';
            const data = await res.json();
            if (data.success && socket) {
                socket.emit('message', { to: currentFriend.id, file: data.url, text: null });
                addMessageToChat(null, data.url, null, new Date().toLocaleTimeString(), true);
            }
            input.value = '';
        }
        
        async function startVoiceRecording() {
            if (isRecording) { stopVoiceRecording(); return; }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
                mediaRecorder.onstop = async () => {
                    isRecording = false;
                    const btn = document.getElementById('voiceRecordBtn');
                    if (btn) { btn.innerHTML = '🎤'; btn.classList.remove('recording'); }
                    if (audioChunks.length === 0) return;
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    const formData = new FormData();
                    formData.append('voice', blob, 'voice.webm');
                    if (btn) btn.innerHTML = '⏳';
                    const res = await fetch('/api/voice', { method: 'POST', body: formData });
                    if (btn) btn.innerHTML = '🎤';
                    const data = await res.json();
                    if (data.success && currentFriend && socket) {
                        socket.emit('message', { to: currentFriend.id, voice: data.url, text: null });
                        addMessageToChat(null, null, data.url, new Date().toLocaleTimeString(), true);
                    }
                    stream.getTracks().forEach(t => t.stop());
                };
                mediaRecorder.start(100);
                isRecording = true;
                const btn = document.getElementById('voiceRecordBtn');
                if (btn) { btn.innerHTML = '🔴'; btn.classList.add('recording'); }
                setTimeout(() => { if (isRecording) stopVoiceRecording(); }, 30000);
            } catch(e) { alert('Нет микрофона'); }
        }
        
        function stopVoiceRecording() { if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop(); }
        function playVoice(url) { document.getElementById('audioPlayer').src = url; document.getElementById('audioPlayer').play(); }
        
        // Звонки
        function startCallTo(userId, userName, type) {
            currentFriend = { id: userId, username: userName };
            startCall(type);
        }
        
        async function startCall(type) {
            if (!currentFriend) { alert('Выберите пользователя'); return; }
            try {
                if (type === 'video') localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                else localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                peerConnection = new RTCPeerConnection(config);
                localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
                peerConnection.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];
                peerConnection.onicecandidate = e => { if (e.candidate) socket.emit('ice-candidate', { toUserId: currentFriend.id, candidate: e.candidate }); };
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                socket.emit('call-user', { toUserId: currentFriend.id, offer, type, fromName: currentUser.username });
                currentCall = { type, toId: currentFriend.id };
                document.getElementById('callerName').innerHTML = currentFriend.username;
                document.getElementById('callStatus').innerHTML = 'Звоним...';
                document.getElementById('callActions').style.display = 'flex';
                document.getElementById('callControls').style.display = 'none';
                document.getElementById('videoContainer').style.display = type === 'video' ? 'flex' : 'none';
                if (type === 'video') document.getElementById('localVideo').srcObject = localStream;
                document.getElementById('callModal').classList.add('active');
            } catch(e) { alert('Нет доступа'); }
        }
        
        async function acceptCall() {
            if (!currentCall) return;
            try {
                if (currentCall.type === 'video') localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                else localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                peerConnection = new RTCPeerConnection(config);
                localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
                peerConnection.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];
                peerConnection.onicecandidate = e => { if (e.candidate) socket.emit('ice-candidate', { toUserId: currentCall.fromId, candidate: e.candidate }); };
                await peerConnection.setRemoteDescription(new RTCSessionDescription(currentCall.offer));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                socket.emit('answer-call', { toUserId: currentCall.fromId, answer });
                document.getElementById('callStatus').innerHTML = 'В разговоре...';
                document.getElementById('callActions').style.display = 'none';
                document.getElementById('callControls').style.display = 'flex';
                if (currentCall.type === 'video') {
                    document.getElementById('localVideo').srcObject = localStream;
                    document.getElementById('videoContainer').style.display = 'flex';
                }
            } catch(e) { console.error(e); }
        }
        
        function declineCall() { if (currentCall) { socket.emit('end-call', { toUserId: currentCall.fromId }); closeCallModal(); } }
        function endCall() { if (localStream) localStream.getTracks().forEach(t => t.stop()); if (peerConnection) peerConnection.close(); if (currentCall) socket.emit('end-call', { toUserId: currentCall.fromId || currentCall.toId }); closeCallModal(); peerConnection = null; localStream = null; }
        function minimizeCall() { document.getElementById('callModal').classList.remove('active'); }
        function toggleMic() { if (localStream) { const t = localStream.getAudioTracks()[0]; if (t) t.enabled = !t.enabled; } }
        function toggleVideo() { if (localStream) { const t = localStream.getVideoTracks()[0]; if (t) t.enabled = !t.enabled; } }
        function closeCallModal() { document.getElementById('callModal').classList.remove('active'); document.getElementById('videoContainer').style.display = 'none'; if (document.getElementById('remoteVideo')) document.getElementById('remoteVideo').srcObject = null; }
        
        // ИГРЫ
        function openGame(game) {
            gameType = game;
            const modal = document.getElementById('gameModal');
            modal.classList.add('active');
            gameCanvas = document.getElementById('gameCanvas');
            gameCtx = gameCanvas.getContext('2d');
            
            if (game === 'pingpong') {
                startPingPong();
            } else if (game === 'snake') {
                startSnake();
            } else if (game === 'tetris') {
                startTetris();
            } else if (game === 'tic-tac-toe') {
                startTicTacToe();
            }
        }
        
        // Пинг-Понг (одиночный)
        function startPingPong() {
            gameCanvas.width = 600;
            gameCanvas.height = 400;
            let ball = { x: 300, y: 200, vx: 3, vy: 2 };
            let paddleY = 150;
            let score = 0;
            let aiPaddle = 150;
            
            function draw() {
                if (!gameCtx) return;
                gameCtx.fillStyle = '#000';
                gameCtx.fillRect(0, 0, 600, 400);
                
                gameCtx.fillStyle = '#fff';
                gameCtx.fillRect(10, paddleY, 10, 80);
                gameCtx.fillRect(580, aiPaddle, 10, 80);
                
                gameCtx.beginPath();
                gameCtx.arc(ball.x, ball.y, 6, 0, Math.PI * 2);
                gameCtx.fill();
                
                gameCtx.font = '20px Arial';
                gameCtx.fillText('Score: ' + score, 250, 30);
                
                ball.x += ball.vx;
                ball.y += ball.vy;
                
                if (ball.y <= 0 || ball.y >= 400) ball.vy = -ball.vy;
                
                if (ball.x <= 20 && ball.x >= 15 && ball.y >= paddleY && ball.y <= paddleY + 80) {
                    ball.vx = -ball.vx;
                    score++;
                }
                
                if (ball.x >= 580 && ball.x <= 585 && ball.y >= aiPaddle && ball.y <= aiPaddle + 80) {
                    ball.vx = -ball.vx;
                }
                
                if (ball.x <= 0) {
                    score = Math.max(0, score - 1);
                    ball = { x: 300, y: 200, vx: 3, vy: 2 };
                }
                if (ball.x >= 600) {
                    alert('Победа! Счёт: ' + score);
                    closeGame();
                    return;
                }
                
                aiPaddle += (ball.y - (aiPaddle + 40)) * 0.05;
                aiPaddle = Math.max(0, Math.min(aiPaddle, 320));
                
                requestAnimationFrame(draw);
            }
            
            gameCanvas.addEventListener('mousemove', (e) => {
                const rect = gameCanvas.getBoundingClientRect();
                let y = (e.clientY - rect.top) * (400 / rect.height);
                paddleY = Math.max(0, Math.min(y, 320));
            });
            
            draw();
        }
        
        // Змейка
        function startSnake() {
            gameCanvas.width = 400;
            gameCanvas.height = 400;
            let snake = [{x: 200, y: 200}];
            let food = {x: 100, y: 100};
            let dir = {x: 20, y: 0};
            let score = 0;
            
            function draw() {
                if (!gameCtx) return;
                gameCtx.fillStyle = '#000';
                gameCtx.fillRect(0, 0, 400, 400);
                
                gameCtx.fillStyle = '#0f0';
                snake.forEach(segment => {
                    gameCtx.fillRect(segment.x, segment.y, 18, 18);
                });
                
                gameCtx.fillStyle = '#f00';
                gameCtx.fillRect(food.x, food.y, 18, 18);
                
                gameCtx.font = '20px Arial';
                gameCtx.fillStyle = '#fff';
                gameCtx.fillText('Score: ' + score, 10, 30);
                
                let head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
                
                if (head.x < 0 || head.x >= 400 || head.y < 0 || head.y >= 400) {
                    alert('Game Over! Score: ' + score);
                    closeGame();
                    return;
                }
                
                snake.unshift(head);
                
                if (Math.abs(head.x - food.x) < 10 && Math.abs(head.y - food.y) < 10) {
                    score++;
                    food = {x: Math.floor(Math.random() * 380 / 20) * 20, y: Math.floor(Math.random() * 380 / 20) * 20};
                } else {
                    snake.pop();
                }
                
                for (let i = 1; i < snake.length; i++) {
                    if (snake[i].x === head.x && snake[i].y === head.y) {
                        alert('Game Over! Score: ' + score);
                        closeGame();
                        return;
                    }
                }
                
                setTimeout(() => requestAnimationFrame(draw), 100);
            }
            
            window.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowUp' && dir.y === 0) dir = {x: 0, y: -20};
                if (e.key === 'ArrowDown' && dir.y === 0) dir = {x: 0, y: 20};
                if (e.key === 'ArrowLeft' && dir.x === 0) dir = {x: -20, y: 0};
                if (e.key === 'ArrowRight' && dir.x === 0) dir = {x: 20, y: 0};
            });
            
            draw();
        }
        
        // Тетрис (упрощённый)
        function startTetris() {
            gameCanvas.width = 300;
            gameCanvas.height = 600;
            gameCtx.fillStyle = '#000';
            gameCtx.fillRect(0, 0, 300, 600);
            gameCtx.fillStyle = '#fff';
            gameCtx.font = '20px Arial';
            gameCtx.fillText('Тетрис - используй стрелки', 20, 300);
            setTimeout(() => {
                alert('Тетрис в разработке');
                closeGame();
            }, 2000);
        }
        
        // Крестики-Нолики
        function startTicTacToe() {
            gameCanvas.width = 300;
            gameCanvas.height = 300;
            let board = Array(9).fill(null);
            let turn = 'X';
            let gameOver = false;
            
            function draw() {
                if (!gameCtx) return;
                gameCtx.fillStyle = '#fff';
                gameCtx.fillRect(0, 0, 300, 300);
                gameCtx.strokeStyle = '#000';
                gameCtx.lineWidth = 2;
                for (let i = 1; i < 3; i++) {
                    gameCtx.beginPath();
                    gameCtx.moveTo(i * 100, 0);
                    gameCtx.lineTo(i * 100, 300);
                    gameCtx.stroke();
                    gameCtx.beginPath();
                    gameCtx.moveTo(0, i * 100);
                    gameCtx.lineTo(300, i * 100);
                    gameCtx.stroke();
                }
                
                gameCtx.font = '60px Arial';
                gameCtx.fillStyle = '#000';
                for (let i = 0; i < 9; i++) {
                    if (board[i]) {
                        let x = (i % 3) * 100 + 35;
                        let y = Math.floor(i / 3) * 100 + 70;
                        gameCtx.fillText(board[i], x, y);
                    }
                }
            }
            
            function checkWinner() {
                const lines = [
                    [0,1,2], [3,4,5], [6,7,8],
                    [0,3,6], [1,4,7], [2,5,8],
                    [0,4,8], [2,4,6]
                ];
                for (let line of lines) {
                    if (board[line[0]] && board[line[0]] === board[line[1]] && board[line[1]] === board[line[2]]) {
                        return board[line[0]];
                    }
                }
                if (board.every(cell => cell !== null)) return 'tie';
                return null;
            }
            
            gameCanvas.addEventListener('click', (e) => {
                if (gameOver) return;
                const rect = gameCanvas.getBoundingClientRect();
                const x = Math.floor((e.clientX - rect.left) / rect.width * 3);
                const y = Math.floor((e.clientY - rect.top) / rect.height * 3);
                const idx = y * 3 + x;
                if (board[idx]) return;
                board[idx] = turn;
                draw();
                const winner = checkWinner();
                if (winner) {
                    gameOver = true;
                    if (winner === 'tie') alert('Ничья!');
                    else alert(`Победил ${winner}!`);
                    setTimeout(() => closeGame(), 2000);
                    return;
                }
                turn = turn === 'X' ? 'O' : 'X';
            });
            
            draw();
        }
        
        function inviteToGameUser(userId, userName) {
            if (!currentFriend || currentFriend.id !== userId) {
                currentFriend = { id: userId, username: userName };
            }
            inviteToGame();
        }
        
        function inviteToGame() {
            if (!currentFriend) {
                alert('Выберите пользователя для игры');
                return;
            }
            if (gameInviteSent) {
                alert('Приглашение уже отправлено');
                return;
            }
            gameInviteSent = true;
            socket.emit('invite-game', { toUserId: currentFriend.id, fromName: currentUser.username });
            alert(`Приглашение отправлено ${currentFriend.username}`);
            setTimeout(() => { gameInviteSent = false; }, 30000);
        }
        
        function startMultiplayerGame(roomId, opponent) {
            gameRoomId = roomId;
            gameOpponent = opponent;
            gameActive = true;
            gamePaddleY = 150;
            gameBall = { x: 300, y: 200, vx: 3, vy: 2 };
            gameScores = { me: 0, opponent: 0 };
            
            const modal = document.getElementById('gameModal');
            modal.classList.add('active');
            gameCanvas = document.getElementById('gameCanvas');
            gameCtx = gameCanvas.getContext('2d');
            gameCanvas.width = 600;
            gameCanvas.height = 400;
            
            const handleMouseMove = (e) => {
                if (!gameActive) return;
                const rect = gameCanvas.getBoundingClientRect();
                let y = (e.clientY - rect.top) * (400 / rect.height);
                gamePaddleY = Math.max(0, Math.min(y, 320));
                if (socket && gameRoomId) {
                    socket.emit('game-move', { roomId: gameRoomId, playerId: currentUser.userId, y: gamePaddleY });
                }
            };
            gameCanvas.addEventListener('mousemove', handleMouseMove);
            
            function draw() {
                if (!gameCtx || !gameActive) return;
                gameCtx.fillStyle = '#000';
                gameCtx.fillRect(0, 0, 600, 400);
                gameCtx.strokeStyle = '#fff';
                gameCtx.beginPath(); gameCtx.moveTo(300, 0); gameCtx.lineTo(300, 400); gameCtx.stroke();
                gameCtx.fillStyle = '#fff';
                gameCtx.fillRect(10, gamePaddleY, 10, 80);
                if (typeof gamePaddleRight !== 'undefined') {
                    gameCtx.fillRect(580, gamePaddleRight, 10, 80);
                }
                gameCtx.beginPath(); gameCtx.arc(gameBall.x, gameBall.y, 6, 0, Math.PI * 2); gameCtx.fill();
                gameCtx.font = '20px Arial';
                gameCtx.fillText(gameScores.me, 250, 30);
                gameCtx.fillText(gameScores.opponent, 330, 30);
                requestAnimationFrame(draw);
            }
            draw();
        }
        
        function openImage(url) { document.getElementById('viewImage').src = url; document.getElementById('imageModal').classList.add('active'); }
        function closeImageViewer() { document.getElementById('imageModal').classList.remove('active'); }
        function scrollToBottom() { const c = document.getElementById('messagesArea'); c.scrollTop = c.scrollHeight; }
        function closeGame() { 
            gameActive = false;
            gameInviteSent = false;
            if (gameRoomId && socket) socket.emit('game-end', { roomId: gameRoomId });
            gameRoomId = null;
            document.getElementById('gameModal').classList.remove('active');
        }
        
        function connectSocket() {
            socket = io();
            socket.emit('login', { userId: currentUser.userId, username: currentUser.username, avatar: currentUser.avatar });
            
            socket.on('new-message', (data) => {
                if (currentFriend && data.from === currentFriend.id) {
                    addMessageToChat(data.text, data.file, data.voice, data.time, false);
                }
            });
            
            socket.on('typing', (data) => { document.getElementById('typingIndicator').innerHTML = `${data.from} печатает...`; clearTimeout(typingTimeout); typingTimeout = setTimeout(() => document.getElementById('typingIndicator').innerHTML = '', 2000); });
            socket.on('online-list', () => { loadUsers(); });
            
            socket.on('incoming-call', (data) => {
                currentCall = { fromId: data.fromId, fromName: data.fromName, offer: data.offer, type: data.type };
                document.getElementById('callerName').innerHTML = data.fromName;
                document.getElementById('callStatus').innerHTML = 'Входящий звонок...';
                document.getElementById('callActions').style.display = 'flex';
                document.getElementById('callControls').style.display = 'none';
                document.getElementById('callModal').classList.add('active');
                const ringtone = document.getElementById('ringtone');
                if (ringtone) ringtone.play().catch(e => console.log);
            });
            socket.on('call-answered', async (data) => { if (peerConnection) { await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer)); document.getElementById('callStatus').innerHTML = 'В разговоре...'; document.getElementById('callActions').style.display = 'none'; document.getElementById('callControls').style.display = 'flex'; } });
            socket.on('ice-candidate', async (data) => { if (peerConnection) { try { await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate)); } catch(e) {} } });
            socket.on('call-ended', () => endCall());
            
            // Игра
            socket.on('game-invite', (data) => {
                if (confirm(`${data.fromName} приглашает вас сыграть в Пинг-Понг! Принять?`)) {
                    socket.emit('accept-game', { fromId: data.fromId, toId: currentUser.userId });
                } else {
                    socket.emit('game-decline', { toId: data.fromId });
                }
            });
            socket.on('game-start', (data) => { startMultiplayerGame(data.roomId, data.opponent); });
            socket.on('game-declined', () => { alert('Собеседник отклонил приглашение'); gameInviteSent = false; });
            socket.on('game-error', (data) => { alert(data.message); gameInviteSent = false; });
            socket.on('game-state', (state) => {
                if (gameActive) {
                    gameBall = state.ball;
                    gamePaddleRight = state.paddles[gameOpponent];
                    gameScores = state.scores;
                }
            });
            socket.on('game-over', (data) => {
                if (gameActive) {
                    if (data.winner === currentUser.userId) alert('🎉 Вы победили!');
                    else alert('😢 Вы проиграли');
                    closeGame();
                }
            });
        }
        
        document.getElementById('messageInput').addEventListener('input', () => {
            if (socket && currentFriend) {
                socket.emit('typing', { to: currentFriend.id, name: currentUser.username });
            }
        });
        
        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        
        generateCaptcha();
    </script>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мессенджер - Звонки, голосовые, чат</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; height: 100vh; overflow: hidden; }
        
        /* Логин */
        .login-screen { position: fixed; top:0; left:0; right:0; bottom:0; background: linear-gradient(135deg,#667eea,#764ba2); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: white; padding: 40px; border-radius: 20px; width: 350px; text-align: center; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; }
        .login-box button { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 10px; cursor: pointer; }
        .tab { display: inline-block; width: 50%; padding: 10px; cursor: pointer; }
        .tab.active { border-bottom: 2px solid #667eea; color: #667eea; }
        .form { display: none; }
        .form.active { display: block; }
        .error { color: red; margin-top: 10px; }
        
        /* Основной интерфейс */
        .app { display: flex; height: 100vh; }
        .sidebar { width: 320px; background: #16213e; color: white; display: flex; flex-direction: column; }
        .user-header { padding: 20px; background: #0f3460; display: flex; justify-content: space-between; align-items: center; }
        .friends-list { flex: 1; overflow-y: auto; padding: 15px; }
        .friend-item { padding: 15px; margin: 5px 0; background: #0f3460; border-radius: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background 0.2s; }
        .friend-item:hover { background: #1a1a4e; }
        .friend-name { display: flex; align-items: center; gap: 8px; }
        .online-dot { width: 8px; height: 8px; border-radius: 50%; background: #4CAF50; display: inline-block; }
        .offline-dot { width: 8px; height: 8px; border-radius: 50%; background: #666; display: inline-block; }
        .unread-badge { background: #f44336; color: white; border-radius: 50%; padding: 2px 8px; font-size: 12px; font-weight: bold; animation: pulse 0.5s; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        
        .add-friend { padding: 15px; display: flex; gap: 10px; border-top: 1px solid #0f3460; }
        .add-friend input { flex: 1; padding: 10px; border: none; border-radius: 5px; }
        .add-friend button { padding: 10px 15px; background: #4CAF50; border: none; border-radius: 5px; color: white; cursor: pointer; }
        
        /* Чат */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #f5f5f5; }
        .chat-header { background: white; padding: 15px 20px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 70%; padding: 10px 15px; border-radius: 15px; }
        .message.own { background: #667eea; color: white; align-self: flex-end; }
        .message.other { background: white; align-self: flex-start; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .message-time { font-size: 10px; margin-top: 5px; opacity: 0.7; }
        .voice-message { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 5px; }
        .voice-play { width: 30px; height: 30px; border-radius: 50%; background: rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; }
        .typing { padding: 10px 20px; font-size: 12px; color: #666; font-style: italic; min-height: 40px; background: white; }
        .input-area { display: flex; padding: 20px; background: white; gap: 10px; border-top: 1px solid #ddd; align-items: center; }
        .input-area input { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 25px; }
        .input-area button { padding: 12px 20px; background: #667eea; color: white; border: none; border-radius: 25px; cursor: pointer; }
        .voice-btn { background: #4CAF50; }
        .voice-btn.recording { background: #f44336; animation: pulse 1s infinite; }
        
        /* Модальное окно звонка */
        .call-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .call-modal.active { display: flex; }
        .call-card {
            background: #1a1a2e;
            border-radius: 30px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            color: white;
        }
        .call-avatar { font-size: 80px; margin-bottom: 20px; }
        .caller-name { font-size: 28px; margin-bottom: 10px; }
        .call-status { font-size: 14px; opacity: 0.8; margin-bottom: 30px; }
        .call-buttons { display: flex; justify-content: center; gap: 30px; }
        .call-btn { width: 70px; height: 70px; border-radius: 50%; border: none; font-size: 30px; cursor: pointer; transition: transform 0.2s; }
        .call-btn:hover { transform: scale(1.1); }
        .accept-btn { background: #4CAF50; color: white; }
        .decline-btn { background: #f44336; color: white; }
        .end-call-btn { background: #f44336; color: white; }
        .minimize-btn { background: #2196F3; color: white; font-size: 20px; position: absolute; top: 20px; right: 20px; width: 40px; height: 40px; border-radius: 50%; border: none; cursor: pointer; }
        
        /* Видео */
        .video-container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .video-box { width: 45%; min-width: 250px; background: #000; border-radius: 10px; overflow: hidden; position: relative; }
        .video-box video { width: 100%; height: auto; }
        .video-label { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 5px; font-size: 12px; }
        .call-controls { display: flex; gap: 20px; margin-top: 20px; }
        
        .hidden { display: none; }
        .no-chat { display: flex; align-items: center; justify-content: center; height: 100%; color: #999; }
    </style>
</head>
<body>
    <!-- Логин -->
    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <h1>💬 Мессенджер</h1>
            <div>
                <div class="tab active" onclick="showTab('login')">Вход</div>
                <div class="tab" onclick="showTab('register')">Регистрация</div>
            </div>
            <div id="loginForm" class="form active">
                <input type="text" id="loginUsername" placeholder="Никнейм">
                <input type="password" id="loginPassword" placeholder="Пароль">
                <button onclick="login()">Войти</button>
                <div id="loginError" class="error"></div>
            </div>
            <div id="registerForm" class="form">
                <input type="text" id="regUsername" placeholder="Никнейм (от 3 символов)">
                <input type="password" id="regPassword" placeholder="Пароль (от 4 символов)">
                <input type="text" id="inviteCode" placeholder="Код дружбы (FRIEND2024)">
                <button onclick="register()">Зарегистрироваться</button>
                <div id="regError" class="error"></div>
            </div>
        </div>
    </div>

    <!-- Основной интерфейс -->
    <div id="app" class="app hidden">
        <div class="sidebar">
            <div class="user-header">
                <div><h3 id="myName"></h3><span style="font-size:12px">🟢 Онлайн</span></div>
                <button onclick="logout()" style="background:none;border:none;color:white;font-size:20px">🚪</button>
            </div>
            <div class="friends-list">
                <h4>👥 Друзья (<span id="friendsCount">0</span>)</h4>
                <div id="friendsContainer"></div>
            </div>
            <div class="add-friend">
                <input type="text" id="friendName" placeholder="Ник друга">
                <button onclick="addFriend()">➕ Добавить</button>
            </div>
        </div>
        
        <div class="chat-area">
            <div class="chat-header">
                <div class="chat-with" id="chatWith">💬 Выберите друга</div>
                <div id="callBtns" style="display:none">
                    <button onclick="startCall('audio')" style="margin:0 5px;padding:10px;background:#2196F3;border:none;border-radius:50%;color:white;cursor:pointer">🎤</button>
                    <button onclick="startCall('video')" style="margin:0 5px;padding:10px;background:#4CAF50;border:none;border-radius:50%;color:white;cursor:pointer">📹</button>
                </div>
            </div>
            <div id="messagesArea" class="messages">
                <div class="no-chat">👈 Нажмите на друга чтобы начать чат</div>
            </div>
            <div id="typingIndicator" class="typing"></div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Сообщение..." disabled>
                <button id="voiceRecordBtn" class="voice-btn" onclick="toggleRecording()" style="background:#4CAF50">🎤</button>
                <button onclick="sendMessage()" id="sendBtn" disabled>📤</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно звонка -->
    <div id="callModal" class="call-modal">
        <button class="minimize-btn" onclick="minimizeCall()">🗕</button>
        <div class="call-card">
            <div class="call-avatar" id="callAvatar">📞</div>
            <div class="caller-name" id="callerName"></div>
            <div class="call-status" id="callStatus">Звонит...</div>
            <div id="callVideoContainer" class="video-container" style="display:none">
                <div class="video-box"><video id="localVideo" autoplay muted playsinline></video><div class="video-label">Вы</div></div>
                <div class="video-box"><video id="remoteVideo" autoplay playsinline></video><div class="video-label">Собеседник</div></div>
            </div>
            <div class="call-buttons" id="callButtons">
                <button class="call-btn accept-btn" onclick="acceptCall()">✅</button>
                <button class="call-btn decline-btn" onclick="declineCall()">❌</button>
            </div>
            <div class="call-controls" id="callControls" style="display:none">
                <button onclick="toggleMic()" style="width:50px;height:50px;border-radius:50%;border:none;font-size:20px">🎤</button>
                <button onclick="toggleVideo()" style="width:50px;height:50px;border-radius:50%;border:none;font-size:20px">📷</button>
                <button onclick="endCall()" style="width:50px;height:50px;border-radius:50%;border:none;background:#f44336;color:white;font-size:20px">📞</button>
            </div>
        </div>
    </div>

    <audio id="audioPlayer"></audio>
    <audio id="ringtone" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" preload="auto"></audio>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket;
        let currentUser = null;
        let currentFriend = null;
        let typingTimeout;
        
        // Звонки
        let peerConnection = null;
        let localStream = null;
        let currentCall = null;
        let isCallActive = false;
        
        // Голосовые
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        
        const config = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' }
            ]
        };
        
        // ========== АВТОРИЗАЦИЯ ==========
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
            if (tab === 'login') {
                document.querySelector('.tab').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
        }
        
        async function register() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const inviteCode = document.getElementById('inviteCode').value.trim();
            
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, inviteCode })
            });
            const data = await res.json();
            if (data.error) document.getElementById('regError').innerText = data.error;
            else { alert('Регистрация успешна! Войдите.'); showTab('login'); }
        }
        
        async function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (data.error) document.getElementById('loginError').innerText = data.error;
            else {
                currentUser = data;
                document.getElementById('myName').innerText = data.username;
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                
                connectSocket();
                loadFriends();
            }
        }
        
        function logout() { location.reload(); }
        
        // ========== ДРУЗЬЯ ==========
        async function loadFriends() {
            const res = await fetch(`/api/friends/${currentUser.userId}`);
            const data = await res.json();
            document.getElementById('friendsCount').innerText = data.friends.length;
            
            const container = document.getElementById('friendsContainer');
            if (data.friends.length === 0) {
                container.innerHTML = '<div style="padding:20px;text-align:center;color:#888">Нет друзей.<br>Добавьте первого!</div>';
            } else {
                container.innerHTML = data.friends.map(f => `
                    <div class="friend-item" onclick="openChat('${f.id}', '${f.username}')">
                        <div class="friend-name">
                            <span class="${f.online ? 'online-dot' : 'offline-dot'}"></span>
                            <span>👤 ${f.username}</span>
                        </div>
                        ${f.unread > 0 ? `<span class="unread-badge">${f.unread}</span>` : ''}
                    </div>
                `).join('');
            }
        }
        
        async function addFriend() {
            const username = document.getElementById('friendName').value.trim();
            if (!username) return;
            
            const res = await fetch('/api/add-friend', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: currentUser.userId, friendUsername: username })
            });
            const data = await res.json();
            if (data.error) alert(data.error);
            else {
                alert(`${username} добавлен в друзья!`);
                document.getElementById('friendName').value = '';
                loadFriends();
            }
        }
        
        // ========== ЧАТ ==========
        function openChat(userId, username) {
            currentFriend = { id: userId, username };
            document.getElementById('chatWith').innerHTML = `💬 Чат с ${username}`;
            document.getElementById('callBtns').style.display = 'flex';
            document.getElementById('messageInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('messagesArea').innerHTML = '';
            
            loadMessages();
        }
        
        async function loadMessages() {
            if (!currentFriend) return;
            
            const res = await fetch(`/api/messages/${currentUser.userId}/${currentFriend.id}`);
            const data = await res.json();
            
            const container = document.getElementById('messagesArea');
            container.innerHTML = '';
            
            if (data.messages.length === 0) {
                container.innerHTML = '<div class="no-chat">💬 Напишите первое сообщение!</div>';
            } else {
                data.messages.forEach(msg => {
                    const isOwn = msg.from_id === currentUser.userId;
                    addMessageToChat(msg.text || '🔊 Голосовое', msg.voice, msg.created_at, isOwn);
                });
            }
            scrollToBottom();
        }
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentFriend || !socket) return;
            
            socket.emit('message', { to: currentFriend.id, text });
            addMessageToChat(text, null, new Date().toLocaleTimeString(), true);
            input.value = '';
        }
        
        function addMessageToChat(text, voiceUrl, time, isOwn) {
            const container = document.getElementById('messagesArea');
            if (container.querySelector('.no-chat')) container.innerHTML = '';
            
            const div = document.createElement('div');
            div.className = `message ${isOwn ? 'own' : 'other'}`;
            
            let content = '';
            if (voiceUrl) {
                content = `<div class="voice-message" onclick="playVoice('${voiceUrl}')">
                    <div class="voice-play">🔊</div>
                    <span>Голосовое сообщение</span>
                </div>`;
            } else {
                content = `<div>${escapeHtml(text)}</div>`;
            }
            
            div.innerHTML = `${content}<div class="message-time">${time}</div>`;
            container.appendChild(div);
            scrollToBottom();
        }
        
        function playVoice(url) {
            const audio = document.getElementById('audioPlayer');
            audio.src = url;
            audio.play();
        }
        
        function scrollToBottom() {
            const container = document.getElementById('messagesArea');
            container.scrollTop = container.scrollHeight;
        }
        
        // ========== ГОЛОСОВЫЕ СООБЩЕНИЯ ==========
        async function toggleRecording() {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }
        
        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.readAsDataURL(blob);
                    reader.onloadend = async () => {
                        const res = await fetch('/api/voice', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ audio: reader.result })
                        });
                        const data = await res.json();
                        if (data.url && currentFriend && socket) {
                            socket.emit('voice-message', { to: currentFriend.id, voiceUrl: data.url });
                            addMessageToChat(null, data.url, new Date().toLocaleTimeString(), true);
                        }
                    };
                    stream.getTracks().forEach(t => t.stop());
                };
                
                mediaRecorder.start();
                isRecording = true;
                const btn = document.getElementById('voiceRecordBtn');
                btn.textContent = '🔴';
                btn.classList.add('recording');
                
                setTimeout(() => { if (isRecording) stopRecording(); }, 30000);
            } catch (e) { alert('Нет микрофона'); }
        }
        
        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                const btn = document.getElementById('voiceRecordBtn');
                btn.textContent = '🎤';
                btn.classList.remove('recording');
            }
        }
        
        // ========== ЗВОНКИ ==========
        async function startCall(type) {
            if (!currentFriend) return;
            
            try {
                if (type === 'video') {
                    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                } else {
                    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                }
                
                peerConnection = new RTCPeerConnection(config);
                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
                
                peerConnection.ontrack = (event) => {
                    const remoteVideo = document.getElementById('remoteVideo');
                    if (remoteVideo) remoteVideo.srcObject = event.streams[0];
                };
                
                peerConnection.onicecandidate = (event) => {
                    if (event.candidate) {
                        socket.emit('ice-candidate', { toUserId: currentFriend.id, candidate: event.candidate });
                    }
                };
                
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                
                socket.emit('call-user', { toUserId: currentFriend.id, offer: offer, type: type });
                
                currentCall = { type, toId: currentFriend.id };
                showCallModal(currentFriend.username, 'outgoing', type);
                
                if (type === 'video') {
                    document.getElementById('localVideo').srcObject = localStream;
                    document.getElementById('callVideoContainer').style.display = 'flex';
                }
            } catch (e) { alert('Нет доступа к камере/микрофону'); }
        }
        
        async function acceptCall() {
            if (!currentCall) return;
            
            try {
                if (currentCall.type === 'video') {
                    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                } else {
                    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                }
                
                peerConnection = new RTCPeerConnection(config);
                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
                
                peerConnection.ontrack = (event) => {
                    document.getElementById('remoteVideo').srcObject = event.streams[0];
                };
                
                peerConnection.onicecandidate = (event) => {
                    if (event.candidate) {
                        socket.emit('ice-candidate', { toUserId: currentCall.fromId, candidate: event.candidate });
                    }
                };
                
                await peerConnection.setRemoteDescription(new RTCSessionDescription(currentCall.offer));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                
                socket.emit('answer-call', { toUserId: currentCall.fromId, answer: answer });
                
                document.getElementById('callStatus').innerHTML = 'В разговоре...';
                document.getElementById('callButtons').style.display = 'none';
                document.getElementById('callControls').style.display = 'flex';
                isCallActive = true;
                
                if (currentCall.type === 'video') {
                    document.getElementById('localVideo').srcObject = localStream;
                    document.getElementById('callVideoContainer').style.display = 'flex';
                }
            } catch (e) { console.error(e); }
        }
        
        function declineCall() {
            if (currentCall) {
                socket.emit('end-call', { toUserId: currentCall.fromId });
                closeCallModal();
            }
        }
        
        function endCall() {
            if (peerConnection) peerConnection.close();
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            if (currentCall) {
                socket.emit('end-call', { toUserId: currentCall.fromId || currentCall.toId });
            }
            closeCallModal();
            isCallActive = false;
            peerConnection = null;
            localStream = null;
        }
        
        function minimizeCall() {
            document.getElementById('callModal').classList.remove('active');
            setTimeout(() => alert('Звонок свернут! Нажмите на иконку телефона чтобы вернуться'), 1000);
        }
        
        function toggleMic() {
            if (localStream) {
                const track = localStream.getAudioTracks()[0];
                if (track) track.enabled = !track.enabled;
            }
        }
        
        function toggleVideo() {
            if (localStream) {
                const track = localStream.getVideoTracks()[0];
                if (track) track.enabled = !track.enabled;
            }
        }
        
        function showCallModal(name, type, callType) {
            document.getElementById('callerName').innerHTML = name;
            document.getElementById('callStatus').innerHTML = type === 'incoming' ? 'Входящий звонок...' : 'Звоним...';
            document.getElementById('callButtons').style.display = 'flex';
            document.getElementById('callControls').style.display = 'none';
            document.getElementById('callVideoContainer').style.display = 'none';
            document.getElementById('callModal').classList.add('active');
            
            if (type === 'incoming') {
                const ringtone = document.getElementById('ringtone');
                ringtone.play().catch(e => console.log);
            }
        }
        
        function closeCallModal() {
            document.getElementById('callModal').classList.remove('active');
            const ringtone = document.getElementById('ringtone');
            ringtone.pause();
            ringtone.currentTime = 0;
        }
        
        // ========== WEBSOCKET ==========
        function connectSocket() {
            socket = io();
            socket.emit('login', { userId: currentUser.userId, username: currentUser.username });
            
            socket.on('message', (data) => {
                if (currentFriend && data.from === currentFriend.id) {
                    addMessageToChat(data.text, null, data.time, false);
                    loadFriends();
                }
            });
            
            socket.on('voice-message', (data) => {
                if (currentFriend && data.from === currentFriend.id) {
                    addMessageToChat(null, data.voiceUrl, data.time, false);
                    loadFriends();
                }
            });
            
            socket.on('unread-update', (data) => {
                if (currentFriend && data.fromId === currentFriend.id) loadFriends();
                else loadFriends();
            });
            
            socket.on('typing', (data) => {
                document.getElementById('typingIndicator').innerHTML = `${data.from} печатает...`;
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => document.getElementById('typingIndicator').innerHTML = '', 2000);
            });
            
            socket.on('online-list', (users) => { loadFriends(); });
            
            // Звонки
            socket.on('incoming-call', (data) => {
                currentCall = { fromId: data.fromId, fromName: data.fromName, offer: data.offer, type: data.type };
                showCallModal(data.fromName, 'incoming', data.type);
            });
            
            socket.on('call-answered', async (data) => {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
                document.getElementById('callStatus').innerHTML = 'В разговоре...';
                document.getElementById('callButtons').style.display = 'none';
                document.getElementById('callControls').style.display = 'flex';
                isCallActive = true;
            });
            
            socket.on('ice-candidate', async (data) => {
                if (peerConnection) {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                }
            });
            
            socket.on('call-ended', () => { endCall(); });
        }
        
        document.getElementById('messageInput').addEventListener('input', () => {
            if (socket && currentFriend) {
                socket.emit('typing', { to: currentFriend.id });
            }
        });
        
        function escapeHtml(text) { const d = document.createElement('div'); d.textContent = text; return d.innerHTML; }
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мессенджер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; height: 100vh; overflow: hidden; }
        
        .login-screen { position: fixed; top:0; left:0; right:0; bottom:0; background: linear-gradient(135deg,#667eea,#764ba2); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: white; padding: 40px; border-radius: 20px; width: 350px; text-align: center; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; }
        .login-box button { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 10px; cursor: pointer; }
        .tab { display: inline-block; width: 50%; padding: 10px; cursor: pointer; }
        .tab.active { border-bottom: 2px solid #667eea; color: #667eea; }
        .form { display: none; }
        .form.active { display: block; }
        .error { color: red; margin-top: 10px; }
        
        .captcha-container { background: #f0f0f0; padding: 15px; border-radius: 10px; margin: 15px 0; text-align: center; }
        .captcha-code { font-size: 28px; letter-spacing: 8px; background: #fff; padding: 10px; border-radius: 8px; font-family: monospace; }
        .captcha-input { width: 100%; padding: 10px; margin-top: 10px; border: 2px solid #ddd; border-radius: 8px; text-align: center; }
        
        .app { display: flex; height: 100vh; }
        @media (max-width: 768px) { .app { flex-direction: column; } .sidebar { width: 100%; max-height: 40%; } }
        
        .sidebar { width: 280px; background: #16213e; color: white; display: flex; flex-direction: column; }
        .user-header { padding: 15px; background: #0f3460; display: flex; justify-content: space-between; align-items: center; }
        .user-name { font-size: 16px; font-weight: bold; }
        .logout-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
        
        .nav-tabs { display: flex; background: #0f3460; padding: 5px; gap: 5px; }
        .nav-tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; border-radius: 10px; font-size: 14px; }
        .nav-tab.active { background: #667eea; }
        .panel { display: none; padding: 15px; flex: 1; overflow-y: auto; }
        .panel.active { display: block; }
        
        .user-item { padding: 12px; margin: 5px 0; background: #0f3460; border-radius: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .user-item:hover { background: #1a1a4e; }
        .online-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; background: #4CAF50; }
        .wins-badge { background: gold; color: #333; border-radius: 20px; padding: 2px 6px; font-size: 10px; margin-left: 5px; }
        
        .find-game-btn { width: 100%; padding: 15px; background: #FF9800; border: none; border-radius: 10px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .find-game-btn:hover { background: #F57C00; }
        .cancel-game-btn { background: #f44336; margin-top: 10px; }
        
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #f5f5f5; }
        .chat-header { background: white; padding: 15px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 70%; padding: 10px 15px; border-radius: 15px; word-wrap: break-word; }
        .message.own { background: #667eea; color: white; align-self: flex-end; }
        .message.other { background: white; align-self: flex-start; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .message-text { font-size: 14px; }
        .message-time { font-size: 10px; margin-top: 5px; opacity: 0.7; }
        .message-sender { font-size: 11px; font-weight: bold; margin-bottom: 3px; }
        
        .typing { padding: 8px 15px; font-size: 12px; color: #666; font-style: italic; background: white; }
        .input-area { display: flex; padding: 15px; background: white; gap: 10px; border-top: 1px solid #ddd; }
        .input-area input { flex: 1; padding: 10px; border: 2px solid #ddd; border-radius: 25px; font-size: 14px; }
        .input-area button { padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 25px; cursor: pointer; }
        
        .game-modal { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; flex-direction: column; z-index: 2500; }
        .game-modal.active { display: flex; }
        .game-container { background: #1a1a2e; border-radius: 20px; padding: 20px; text-align: center; }
        .game-board { display: grid; grid-template-columns: repeat(3, 100px); gap: 5px; background: #fff; padding: 10px; border-radius: 10px; margin: 0 auto; }
        .game-cell { width: 100px; height: 100px; background: #2196F3; display: flex; align-items: center; justify-content: center; font-size: 48px; font-weight: bold; color: white; cursor: pointer; border-radius: 10px; }
        .game-cell:hover { background: #1976D2; }
        .game-info { margin-top: 15px; color: white; font-size: 18px; }
        .game-controls { margin-top: 15px; }
        .game-btn-close { padding: 10px 20px; background: #4CAF50; border: none; border-radius: 10px; color: white; cursor: pointer; }
        
        .hidden { display: none; }
        .no-chat { display: flex; align-items: center; justify-content: center; height: 100%; color: #999; text-align: center; padding: 20px; }
    </style>
</head>
<body>
    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <h1>💬 Мессенджер</h1>
            <div><div class="tab active" onclick="showTab('login')">Вход</div><div class="tab" onclick="showTab('register')">Регистрация</div></div>
            
            <div id="loginForm" class="form active">
                <input type="text" id="loginUsername" placeholder="Никнейм">
                <input type="password" id="loginPassword" placeholder="Пароль">
                <button onclick="login()">Войти</button>
                <div id="loginError" class="error"></div>
            </div>
            
            <div id="registerForm" class="form">
                <input type="text" id="regUsername" placeholder="Никнейм (3+ символов)">
                <input type="password" id="regPassword" placeholder="Пароль (4+ символов)">
                <input type="text" id="inviteCode" placeholder="Код дружбы" value="FRIEND2024">
                <div class="captcha-container">
                    <div class="captcha-code" id="captchaCode"></div>
                    <input type="text" id="captchaInput" class="captcha-input" placeholder="Введите код" maxlength="6">
                    <button type="button" onclick="generateCaptcha()" style="background:none;border:none;cursor:pointer;margin-top:5px">🔄</button>
                </div>
                <button onclick="register()">Зарегистрироваться</button>
                <div id="regError" class="error"></div>
            </div>
        </div>
    </div>

    <div id="app" class="app hidden">
        <div class="sidebar">
            <div class="user-header">
                <div class="user-name" id="myName"></div>
                <div>🏆 <span id="myWins">0</span></div>
                <button class="logout-btn" onclick="logout()">🚪</button>
            </div>
            
            <div class="nav-tabs">
                <div class="nav-tab active" onclick="switchPanel('chats')">💬 Чаты</div>
                <div class="nav-tab" onclick="switchPanel('game')">🎮 Игра</div>
            </div>
            
            <div id="chatsPanel" class="panel active">
                <div id="usersContainer"></div>
                <div style="margin-top:10px; display:flex; gap:8px">
                    <input type="text" id="friendName" placeholder="Ник друга" style="flex:1; padding:8px; border-radius:10px; border:none">
                    <button onclick="addFriend()" style="background:#4CAF50; border:none; border-radius:10px; padding:8px 15px; color:white">➕</button>
                </div>
            </div>
            
            <div id="gamePanel" class="panel">
                <button id="findGameBtn" class="find-game-btn" onclick="findGame()">🎮 Найти игру</button>
                <button id="cancelGameBtn" class="find-game-btn cancel-game-btn hidden" onclick="cancelFindGame()">❌ Отменить</button>
                <div id="gameQueueStatus" style="text-align:center; margin-top:15px; opacity:0.7"></div>
            </div>
        </div>
        
        <div class="chat-area">
            <div class="chat-header">
                <div id="chatWith">💬 Выберите чат</div>
            </div>
            <div id="messagesArea" class="messages"><div class="no-chat">👈 Нажмите на пользователя</div></div>
            <div id="typingIndicator" class="typing"></div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Сообщение..." disabled onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()" id="sendBtn" disabled>📤</button>
            </div>
        </div>
    </div>

    <div id="gameModal" class="game-modal">
        <div class="game-container">
            <div id="gameBoard" class="game-board"></div>
            <div id="gameInfo" class="game-info"></div>
            <div class="game-controls">
                <button class="game-btn-close" onclick="closeGame()">Закрыть</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket, currentUser, currentFriend = null;
        let typingTimeout;
        let currentCaptcha = "";
        
        // Игра
        let gameRoomId = null;
        let gameBoard = Array(9).fill(null);
        let gameMyTurn = false;
        let gameSymbol = 'X';
        let gameOver = false;
        let isFindingGame = false;
        
        function generateCaptcha() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ0123456789';
            let captcha = '';
            for (let i = 0; i < 6; i++) captcha += chars[Math.floor(Math.random() * chars.length)];
            currentCaptcha = captcha;
            const el = document.getElementById('captchaCode');
            if (el) el.innerHTML = captcha;
        }
        
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
            if (tab === 'login') {
                document.querySelector('.tab').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('registerForm').classList.add('active');
                generateCaptcha();
            }
        }
        
        function switchPanel(panel) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            if (panel === 'chats') {
                document.querySelector('.nav-tab').classList.add('active');
                document.getElementById('chatsPanel').classList.add('active');
                loadUsers();
            } else {
                document.querySelectorAll('.nav-tab')[1].classList.add('active');
                document.getElementById('gamePanel').classList.add('active');
            }
        }
        
        async function register() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const inviteCode = document.getElementById('inviteCode').value.trim();
            const captchaInput = document.getElementById('captchaInput').value.trim().toUpperCase();
            
            if (!captchaInput || captchaInput !== currentCaptcha) {
                document.getElementById('regError').innerText = 'Неверный код!';
                generateCaptcha();
                document.getElementById('captchaInput').value = '';
                return;
            }
            
            const res = await fetch('/api/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password, inviteCode }) });
            const data = await res.json();
            if (data.error) document.getElementById('regError').innerText = data.error;
            else { alert('Регистрация успешна! Войдите.'); showTab('login'); }
        }
        
        async function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
            const data = await res.json();
            if (data.error) document.getElementById('loginError').innerText = data.error;
            else {
                currentUser = data;
                document.getElementById('myName').innerText = data.username;
                document.getElementById('myWins').innerText = data.wins || 0;
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                connectSocket();
                loadUsers();
            }
        }
        
        function logout() { location.reload(); }
        
        async function addFriend() {
            const username = document.getElementById('friendName').value.trim();
            if (!username) return;
            alert(`Заявка отправлена ${username}`);
            document.getElementById('friendName').value = '';
        }
        
        async function loadUsers() {
            const res = await fetch(`/api/users/${currentUser.userId}`);
            const data = await res.json();
            const container = document.getElementById('usersContainer');
            if (!data.users || data.users.length === 0) {
                container.innerHTML = '<div style="padding:20px;text-align:center;opacity:0.6">Нет пользователей</div>';
            } else {
                container.innerHTML = data.users.map(u => `
                    <div class="user-item" onclick="selectUser('${u.id}', '${u.username}')">
                        <div><span class="online-dot"></span>${u.username} ${u.wins ? `<span class="wins-badge">🏆${u.wins}</span>` : ''}</div>
                    </div>
                `).join('');
            }
        }
        
        function selectUser(userId, username) {
            currentFriend = { id: userId, username };
            document.getElementById('chatWith').innerHTML = `💬 Чат с ${username}`;
            document.getElementById('messageInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('messagesArea').innerHTML = '';
            loadMessages();
        }
        
        async function loadMessages() {
            if (!currentFriend) return;
            const res = await fetch(`/api/messages/${currentUser.userId}/${currentFriend.id}`);
            const data = await res.json();
            const container = document.getElementById('messagesArea');
            container.innerHTML = '';
            if (!data.messages || data.messages.length === 0) {
                container.innerHTML = '<div class="no-chat">💬 Напишите первое сообщение!</div>';
            } else {
                data.messages.forEach(msg => {
                    const isOwn = msg.from_id === currentUser.userId;
                    addMessageToChat(msg.text, msg.time, isOwn, msg.from_id === currentUser.userId ? null : currentFriend.username);
                });
            }
            scrollToBottom();
        }
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentFriend || !socket) return;
            
            socket.emit('message', { to: currentFriend.id, text });
            addMessageToChat(text, new Date().toLocaleTimeString(), true);
            input.value = '';
        }
        
        function addMessageToChat(text, time, isOwn, senderName) {
            const container = document.getElementById('messagesArea');
            if (container.querySelector('.no-chat')) container.innerHTML = '';
            const div = document.createElement('div');
            div.className = `message ${isOwn ? 'own' : 'other'}`;
            
            let senderHtml = '';
            if (!isOwn && senderName) {
                senderHtml = `<div class="message-sender">${escapeHtml(senderName)}</div>`;
            }
            
            div.innerHTML = `${senderHtml}<div class="message-text">${escapeHtml(text)}</div><div class="message-time">${time}</div>`;
            container.appendChild(div);
            scrollToBottom();
        }
        
        function scrollToBottom() { const c = document.getElementById('messagesArea'); c.scrollTop = c.scrollHeight; }
        
        // ========== ИГРА ==========
        function findGame() {
            if (isFindingGame) return;
            isFindingGame = true;
            document.getElementById('findGameBtn').classList.add('hidden');
            document.getElementById('cancelGameBtn').classList.remove('hidden');
            document.getElementById('gameQueueStatus').innerHTML = '🔍 Поиск соперника...';
            socket.emit('find-game');
        }
        
        function cancelFindGame() {
            isFindingGame = false;
            document.getElementById('findGameBtn').classList.remove('hidden');
            document.getElementById('cancelGameBtn').classList.add('hidden');
            document.getElementById('gameQueueStatus').innerHTML = '';
            socket.emit('cancel-find-game');
        }
        
        function startGame(roomId, opponent, youStart) {
            gameRoomId = roomId;
            gameBoard = Array(9).fill(null);
            gameMyTurn = youStart;
            gameSymbol = gameMyTurn ? 'X' : 'O';
            gameOver = false;
            
            renderGameBoard();
            document.getElementById('gameInfo').innerHTML = gameMyTurn ? 'Ваш ход (X)' : 'Ход соперника (O)';
            document.getElementById('gameModal').classList.add('active');
        }
        
        function renderGameBoard() {
            const boardEl = document.getElementById('gameBoard');
            boardEl.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.className = 'game-cell';
                cell.textContent = gameBoard[i] || '';
                cell.onclick = () => makeMove(i);
                boardEl.appendChild(cell);
            }
        }
        
        function makeMove(index) {
            if (gameOver) return;
            if (!gameMyTurn) {
                alert('Сейчас не ваш ход');
                return;
            }
            if (gameBoard[index]) {
                alert('Клетка занята');
                return;
            }
            
            gameBoard[index] = gameSymbol;
            renderGameBoard();
            
            socket.emit('game-move', { roomId: gameRoomId, index: index });
            gameMyTurn = false;
            document.getElementById('gameInfo').innerHTML = 'Ход соперника...';
            
            // Проверка победы
            const winner = checkWinner();
            if (winner) {
                gameOver = true;
                if (winner === gameSymbol) {
                    document.getElementById('gameInfo').innerHTML = '🎉 Вы победили! 🎉';
                    const newWins = parseInt(document.getElementById('myWins').innerText) + 1;
                    document.getElementById('myWins').innerText = newWins;
                    fetch('/api/update-wins', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId: currentUser.userId, wins: newWins }) });
                } else if (winner === 'tie') {
                    document.getElementById('gameInfo').innerHTML = 'Ничья!';
                } else {
                    document.getElementById('gameInfo').innerHTML = '😢 Вы проиграли';
                }
                setTimeout(() => closeGame(), 2000);
            }
        }
        
        function checkWinner() {
            const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for (let line of lines) {
                if (gameBoard[line[0]] && gameBoard[line[0]] === gameBoard[line[1]] && gameBoard[line[1]] === gameBoard[line[2]]) {
                    return gameBoard[line[0]];
                }
            }
            if (gameBoard.every(c => c !== null)) return 'tie';
            return null;
        }
        
        function updateGameMove(index, playerId) {
            if (playerId !== currentUser.userId) {
                const symbol = gameSymbol === 'X' ? 'O' : 'X';
                gameBoard[index] = symbol;
                renderGameBoard();
                gameMyTurn = true;
                document.getElementById('gameInfo').innerHTML = 'Ваш ход (X)';
                
                const winner = checkWinner();
                if (winner) {
                    gameOver = true;
                    if (winner === gameSymbol) {
                        document.getElementById('gameInfo').innerHTML = '🎉 Вы победили! 🎉';
                        const newWins = parseInt(document.getElementById('myWins').innerText) + 1;
                        document.getElementById('myWins').innerText = newWins;
                        fetch('/api/update-wins', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId: currentUser.userId, wins: newWins }) });
                    } else if (winner === 'tie') {
                        document.getElementById('gameInfo').innerHTML = 'Ничья!';
                    } else {
                        document.getElementById('gameInfo').innerHTML = '😢 Вы проиграли';
                    }
                    setTimeout(() => closeGame(), 2000);
                }
            }
        }
        
        function closeGame() {
            if (gameRoomId && socket) socket.emit('game-end', { roomId: gameRoomId });
            gameRoomId = null;
            isFindingGame = false;
            document.getElementById('findGameBtn').classList.remove('hidden');
            document.getElementById('cancelGameBtn').classList.add('hidden');
            document.getElementById('gameQueueStatus').innerHTML = '';
            document.getElementById('gameModal').classList.remove('active');
        }
        
        function connectSocket() {
            socket = io();
            socket.emit('login', { userId: currentUser.userId, username: currentUser.username, wins: currentUser.wins });
            
            socket.on('new-message', (data) => {
                if (currentFriend && data.from === currentFriend.id) {
                    addMessageToChat(data.text, data.time, false, data.fromName);
                }
            });
            
            socket.on('typing', (data) => { document.getElementById('typingIndicator').innerHTML = `${data.from} печатает...`; clearTimeout(typingTimeout); typingTimeout = setTimeout(() => document.getElementById('typingIndicator').innerHTML = '', 2000); });
            socket.on('online-list', () => { loadUsers(); });
            
            // ИГРА
            socket.on('game-queue', (data) => {
                document.getElementById('gameQueueStatus').innerHTML = data.message;
            });
            
            socket.on('game-found', (data) => {
                startGame(data.roomId, data.opponent, data.youStart);
                isFindingGame = false;
                document.getElementById('findGameBtn').classList.remove('hidden');
                document.getElementById('cancelGameBtn').classList.add('hidden');
                document.getElementById('gameQueueStatus').innerHTML = '';
            });
            
            socket.on('game-move-made', (data) => {
                updateGameMove(data.index, data.playerId);
            });
        }
        
        document.getElementById('messageInput').addEventListener('input', () => {
            if (socket && currentFriend) {
                socket.emit('typing', { to: currentFriend.id, name: currentUser.username });
            }
        });
        
        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        
        generateCaptcha();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Мессенджер — Полный функционал</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0e0e10;
            height: 100vh;
            overflow: hidden;
        }

        /* Логин */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #1f1c2c, #1a1a2e);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(4px);
        }

        .login-card {
            background: rgba(30, 30, 40, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 32px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .login-card h1 {
            font-size: 28px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #a06eff, #5271ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .login-card input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: #1e1e24;
            border: 1px solid #2c2c34;
            border-radius: 16px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: 0.2s;
        }

        .login-card input:focus {
            border-color: #6c5ce7;
        }

        .login-card button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6c5ce7, #a06eff);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 12px;
        }

        .tabs {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
            border-bottom: 1px solid #2c2c34;
            padding-bottom: 8px;
        }

        .tab {
            flex: 1;
            background: none;
            border: none;
            color: #aaa;
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
        }

        .tab.active {
            color: #a06eff;
            border-bottom: 2px solid #6c5ce7;
        }

        .form {
            display: none;
        }

        .form.active {
            display: block;
        }

        .captcha-block {
            background: #1e1e24;
            padding: 12px;
            border-radius: 20px;
            margin: 12px 0;
            font-family: monospace;
            font-size: 22px;
            letter-spacing: 6px;
            text-align: center;
            user-select: none;
        }

        .error {
            color: #ff5e5e;
            font-size: 13px;
            margin-top: 8px;
        }

        /* Основной интерфейс */
        .app-layout {
            display: flex;
            height: 100vh;
            background: #0e0e10;
        }

        /* Боковая панель */
        .sidebar {
            width: 320px;
            background: #1a1a1f;
            border-right: 1px solid #2a2a30;
            display: flex;
            flex-direction: column;
            transition: 0.2s;
        }

        .user-preview {
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #2a2a30;
            background: #1e1e24;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #2c2c34;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            overflow: hidden;
            position: relative;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-details {
            flex: 1;
        }

        .user-name-side {
            font-weight: bold;
            font-size: 16px;
        }

        .user-status {
            font-size: 12px;
            color: #7a7a85;
        }

        .online-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #44b77b;
            border-radius: 50%;
            margin-right: 6px;
        }

        /* Навигация */
        .nav-items {
            padding: 12px 16px;
            display: flex;
            gap: 20px;
            border-bottom: 1px solid #2a2a30;
        }

        .nav-btn {
            background: none;
            border: none;
            color: #aaa;
            font-weight: 600;
            cursor: pointer;
            padding: 6px 0;
            font-size: 14px;
        }

        .nav-btn.active {
            color: #a06eff;
            border-bottom: 2px solid #6c5ce7;
        }

        .search-add {
            padding: 12px;
            display: flex;
            gap: 8px;
        }

        .search-add input {
            flex: 1;
            background: #121214;
            border: none;
            padding: 10px;
            border-radius: 30px;
            color: white;
        }

        .search-add button {
            background: #2c2c34;
            border: none;
            width: 38px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }

        .users-list, .groups-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .user-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            border-radius: 14px;
            cursor: pointer;
            transition: 0.1s;
            margin-bottom: 6px;
        }

        .user-card:hover {
            background: #25252c;
        }

        .user-card-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .mini-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #2c2c34;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            overflow: hidden;
        }

        .user-card-name {
            font-weight: 500;
        }

        .online-status {
            font-size: 10px;
            color: #44b77b;
        }

        /* Чат */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .chat-header {
            background: rgba(30, 30, 40, 0.85);
            backdrop-filter: blur(12px);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #3a3a44;
            z-index: 10;
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .call-actions button {
            background: #2c2c34;
            border: none;
            border-radius: 40px;
            padding: 6px 12px;
            color: white;
            margin-left: 8px;
            cursor: pointer;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 70%;
            padding: 8px 14px;
            border-radius: 20px;
            position: relative;
            word-wrap: break-word;
            color: white !important;
        }

        .message.own {
            background: #6c5ce7;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.other {
            background: #24242c;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message-sender {
            font-size: 11px;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        .message-time {
            font-size: 9px;
            margin-top: 4px;
            opacity: 0.5;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        .pinned-messages {
            background: #1f1f28;
            padding: 10px 20px;
            font-size: 12px;
            border-bottom: 1px solid #3a3a44;
            display: flex;
            overflow-x: auto;
            gap: 16px;
            white-space: nowrap;
            z-index: 9;
        }

        .pin-item {
            background: #2c2c34;
            padding: 4px 12px;
            border-radius: 30px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: white;
        }

        /* Ввод */
        .input-wrapper {
            background: #1e1e24;
            padding: 12px 20px;
            display: flex;
            gap: 12px;
            align-items: center;
            border-top: 1px solid #2a2a30;
        }

        .input-wrapper input {
            flex: 1;
            background: #121214;
            border: none;
            padding: 12px 16px;
            border-radius: 30px;
            color: white;
            outline: none;
        }

        .tool-btn {
            background: #2c2c34;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        .notification-toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #6c5ce7;
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 13px;
            z-index: 4000;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
        }

        /* Модалки */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }

        .modal-card {
            background: #1e1e24;
            border-radius: 32px;
            width: 320px;
            padding: 24px;
            text-align: center;
        }

        button {
            cursor: pointer;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="loginScreen" class="login-screen">
        <div class="login-card">
            <h1>Вход / Регистрация</h1>
            <div class="tabs">
                <button class="tab active" id="tabLoginBtn">Вход</button>
                <button class="tab" id="tabRegBtn">Регистрация</button>
            </div>
            <div id="loginFormBlock" class="form active">
                <input type="text" id="loginName" placeholder="Никнейм">
                <input type="password" id="loginPass" placeholder="Пароль">
                <button id="doLogin">Войти</button>
                <div id="loginError" class="error"></div>
            </div>
            <div id="regFormBlock" class="form">
                <input type="text" id="regName" placeholder="Никнейм">
                <input type="password" id="regPass" placeholder="Пароль">
                <input type="text" id="inviteCode" placeholder="Код приглашения" value="FRIEND2024">
                <div class="captcha-block" id="captchaCode"></div>
                <input type="text" id="captchaAnswer" placeholder="Код с картинки">
                <button id="doReg">Зарегистрироваться</button>
                <div id="regError" class="error"></div>
            </div>
        </div>
    </div>

    <div id="mainApp" class="app-layout hidden">
        <!-- левая панель -->
        <div class="sidebar">
            <div class="user-preview">
                <div class="avatar" id="avatarPreview" onclick="document.getElementById('avatarUpload').click()">
                    <img id="avatarImg" src="/uploads/default.png">
                </div>
                <input type="file" id="avatarUpload" style="display:none" accept="image/*">
                <div class="user-details">
                    <div class="user-name-side" id="sideUsername"></div>
                    <div class="user-status"><span class="online-dot"></span> В сети</div>
                </div>
            </div>
            <div class="nav-items">
                <button class="nav-btn active" data-panel="chats">💬 Чаты</button>
                <button class="nav-btn" data-panel="notes">📝 Заметки</button>
                <button class="nav-btn" data-panel="settings">⚙️ Настройки</button>
            </div>
            <div id="chatsPanel" class="panel" style="display: flex; flex-direction: column; flex:1;">
                <div class="search-add">
                    <input type="text" id="searchUser" placeholder="Никнейм...">
                    <button id="addFriendBtn">➕</button>
                </div>
                <div id="usersListChat" class="users-list"></div>
            </div>
            <div id="notesPanel" class="panel hidden">
                <div style="padding: 12px;">
                    <input type="text" id="noteTitle" placeholder="Заголовок заметки" style="width:100%; margin-bottom:8px; background:#121214; border:none; padding:10px; border-radius:16px; color:white;">
                    <textarea id="noteContent" rows="2" placeholder="Текст..." style="width:100%; background:#121214; border:none; padding:10px; border-radius:16px; color:white;"></textarea>
                    <button id="createNoteBtn" style="width:100%; margin-top:8px; background:#6c5ce7; border:none; border-radius:30px; padding:8px;">➕ Добавить</button>
                </div>
                <div id="notesList" style="padding: 8px; overflow-y:auto;"></div>
            </div>
            <div id="settingsPanel" class="panel hidden">
                <div style="padding: 16px;">
                    <h4 style="color:white">Обои чата</h4>
                    <input type="color" id="wallColor" value="#1a1a2e" style="width:100%; margin-bottom:8px;">
                    <button id="uploadWallpaperBtn" style="background:#2c2c34; border:none; padding:8px; border-radius:20px; margin-bottom:8px; color:white;">📁 Загрузить свои обои</button>
                    <input type="text" id="wallpaperUrl" placeholder="Или вставьте ссылку на изображение" style="width:100%; background:#121214; border:none; padding:8px; border-radius:30px; margin-bottom:8px; color:white;">
                    <button id="applyWallLink" style="background:#6c5ce7; border:none; padding:8px; border-radius:30px; color:white;">Применить фон</button>

                    <h4 style="margin-top:16px; color:white">Анонимный режим</h4>
                    <label style="color:white"><input type="checkbox" id="anonymousMode"> Скрыть ник (#Anonim#)</label>
                    <h4 style="margin-top:16px; color:white">Заблокированные</h4>
                    <div id="blockedList"></div>
                </div>
            </div>
        </div>

        <!-- Чат -->
        <div class="chat-main" id="chatMain">
            <div class="chat-header">
                <div class="chat-header-left">
                    <div class="mini-avatar" id="chatAvatar"></div>
                    <div><strong id="chatUsername" style="color:white">Выберите диалог</strong><div id="chatStatusIndicator" style="color:#aaa"></div></div>
                </div>
                <div class="call-actions">
                    <button id="audioCallBtn">🎤</button>
                    <button id="videoCallBtn">📹</button>
                </div>
            </div>
            <div id="pinnedMessagesBar" class="pinned-messages"></div>
            <div id="chatMessages" class="messages-area"></div>
            <div class="input-wrapper">
                <button id="fileBtn" class="tool-btn">📎</button>
                <button id="voiceRecordBtn" class="tool-btn">🎤</button>
                <input type="text" id="msgInput" placeholder="Сообщение..." disabled>
                <button id="sendMsgBtn" class="tool-btn" disabled>📤</button>
            </div>
        </div>
    </div>

    <div id="notificationToast" class="notification-toast">Сообщение отправлено</div>
    <input type="file" id="hiddenFileInput" style="display:none">
    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Основные переменные
        let socket, currentUser = null, currentChatUser = null;
        let messagesStore = {}; // { chatId: [] }
        let pinnedStore = {}; // { chatId: [msgId] }
        let blockedUsers = new Set();
        let anonymousMode = false;
        let mediaRecorder, audioChunks = [], isRecording = false;

        // DOM элементы
        const loginScreen = document.getElementById('loginScreen');
        const mainApp = document.getElementById('mainApp');
        const toast = document.getElementById('notificationToast');

        function showToast(text) { toast.innerText = text; toast.style.opacity = '1'; setTimeout(() => toast.style.opacity = '0', 2000); }

        // --- Капча ---
        let captchaText = '';
        function generateCaptcha() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ0123456789';
            let res = '';
            for(let i=0;i<6;i++) res += chars[Math.floor(Math.random() * chars.length)];
            captchaText = res;
            document.getElementById('captchaCode').innerText = res;
        }

        // --- Регистрация / Логин ---
        document.getElementById('tabLoginBtn').onclick = () => {
            document.getElementById('loginFormBlock').classList.add('active');
            document.getElementById('regFormBlock').classList.remove('active');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tabLoginBtn').classList.add('active');
        };
        document.getElementById('tabRegBtn').onclick = () => {
            document.getElementById('loginFormBlock').classList.remove('active');
            document.getElementById('regFormBlock').classList.add('active');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tabRegBtn').classList.add('active');
            generateCaptcha();
        };

        document.getElementById('doLogin').onclick = async () => {
            const username = document.getElementById('loginName').value.trim();
            const password = document.getElementById('loginPass').value;
            const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type':'application/json' }, body: JSON.stringify({ username, password }) });
            const data = await res.json();
            if(data.error) document.getElementById('loginError').innerText = data.error;
            else {
                currentUser = data;
                document.getElementById('sideUsername').innerText = currentUser.username;
                document.getElementById('avatarImg').src = currentUser.avatar || '/uploads/default.png';
                loginScreen.classList.add('hidden');
                mainApp.classList.remove('hidden');
                connectSocket();
                loadUsersList();
                loadNotes();
                applyStoredWallpaper();
            }
        };

        document.getElementById('doReg').onclick = async () => {
            const username = document.getElementById('regName').value.trim();
            const password = document.getElementById('regPass').value;
            const inviteCode = document.getElementById('inviteCode').value.trim();
            const captchaAnswer = document.getElementById('captchaAnswer').value.trim();
            if(captchaAnswer !== captchaText) { document.getElementById('regError').innerText = 'Неверная капча'; generateCaptcha(); return; }
            const res = await fetch('/api/register', { method: 'POST', headers: { 'Content-Type':'application/json' }, body: JSON.stringify({ username, password, inviteCode }) });
            const data = await res.json();
            if(data.error) document.getElementById('regError').innerText = data.error;
            else { alert('Регистрация успешна!'); document.getElementById('tabLoginBtn').click(); }
        };

        // --- Обои ---
        function setWallpaper(url) {
            document.getElementById('chatMain').style.backgroundImage = `url(${url})`;
            document.getElementById('chatMain').style.backgroundSize = 'cover';
            localStorage.setItem('wallpaper', url);
        }
        document.getElementById('uploadWallpaperBtn').onclick = () => {
            const input = document.createElement('input');
            input.type = 'file'; input.accept = 'image/*';
            input.onchange = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (ev) => setWallpaper(ev.target.result);
                reader.readAsDataURL(file);
            };
            input.click();
        };
        document.getElementById('applyWallLink').onclick = () => {
            const url = document.getElementById('wallpaperUrl').value.trim();
            if(url) setWallpaper(url);
        };
        function applyStoredWallpaper() { const saved = localStorage.getItem('wallpaper'); if(saved) setWallpaper(saved); }

        // --- Сокет ---
        function connectSocket() {
            socket = io();
            socket.emit('login', { userId: currentUser.userId, username: currentUser.username, avatar: currentUser.avatar });
            socket.on('users-list', (list) => { renderUsersList(list); });
            socket.on('new-message', (msg) => {
                if(currentChatUser && (msg.from === currentChatUser.id || msg.to === currentChatUser.id)) {
                    addMessageToDom(msg, msg.from === currentUser.userId);
                }
                saveMessageLocally(msg);
                if(msg.from !== currentUser.userId && currentChatUser && msg.from === currentChatUser.id) showToast(`Новое сообщение от ${msg.fromName}`);
            });
            socket.on('typing', (data) => { if(currentChatUser && data.from === currentChatUser.id) showTyping(data.name); });
        }

        function showTyping(name) { document.getElementById('chatStatusIndicator').innerHTML = `<i>${name} печатает...</i>`; setTimeout(() => document.getElementById('chatStatusIndicator').innerHTML = '', 1500); }

        function saveMessageLocally(msg) {
            let room = [currentUser.userId, msg.from].sort().join('-');
            if(!messagesStore[room]) messagesStore[room] = [];
            messagesStore[room].push(msg);
        }

        function addMessageToDom(msg, isOwn) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = `message ${isOwn ? 'own' : 'other'}`;
            let showName = msg.fromName;
            if(anonymousMode && !isOwn) showName = '#Anonim#';
            let content = '';
            if(msg.text) content = `<div>${escapeHtml(msg.text)}</div>`;
            else if(msg.file) {
                if(msg.fileType === 'image') content = `<img src="${msg.file}" style="max-width:200px; border-radius:12px;">`;
                else content = `<a href="${msg.file}" download style="color:white">📎 Файл</a>`;
            }
            else if(msg.voice) content = `<audio controls src="${msg.voice}" style="max-width:180px"></audio>`;
            div.innerHTML = `<div class="message-sender">${showName}</div>${content}<div class="message-time">${msg.time}</div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // --- Файлы и голосовые ---
        document.getElementById('fileBtn').onclick = () => { document.getElementById('hiddenFileInput').click(); };
        document.getElementById('hiddenFileInput').onchange = async (e) => {
            const file = e.target.files[0];
            if(!file || !currentChatUser) return;
            const formData = new FormData();
            formData.append('file', file);
            const res = await fetch('/api/upload-file', { method: 'POST', body: formData });
            const data = await res.json();
            if(data.success) {
                socket.emit('message', { to: currentChatUser.id, file: data.url, fileType: data.isImage ? 'image' : 'file', text: null });
                showToast('Файл отправлен');
            }
        };

        async function startVoiceRecording() {
            if(isRecording) { if(mediaRecorder) mediaRecorder.stop(); return; }
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                const formData = new FormData();
                formData.append('voice', blob, 'voice.webm');
                const res = await fetch('/api/voice', { method: 'POST', body: formData });
                const data = await res.json();
                if(data.success && currentChatUser) {
                    socket.emit('message', { to: currentChatUser.id, voice: data.url, text: null });
                    showToast('Голосовое отправлено');
                }
                stream.getTracks().forEach(t => t.stop());
                isRecording = false;
                document.getElementById('voiceRecordBtn').style.background = '#2c2c34';
            };
            mediaRecorder.start();
            isRecording = true;
            document.getElementById('voiceRecordBtn').style.background = '#ff5e5e';
            setTimeout(() => { if(mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop(); }, 30000);
        }
        document.getElementById('voiceRecordBtn').onclick = startVoiceRecording;

        // --- Загрузка списка пользователей ---
        async function loadUsersList() {
            const res = await fetch(`/api/users/${currentUser.userId}`);
            const data = await res.json();
            renderUsersList(data.users);
        }

        function renderUsersList(users) {
            const container = document.getElementById('usersListChat');
            container.innerHTML = users.map(u => `
                <div class="user-card" data-id="${u.id}" data-name="${u.username}">
                    <div class="user-card-left">
                        <div class="mini-avatar"><img src="${u.avatar || '/uploads/default.png'}" style="width:100%"></div>
                        <div><div class="user-card-name" style="color:white">${u.username}</div><div class="online-status">${u.online ? '🟢 онлайн' : '⚫ офлайн'}</div></div>
                    </div>
                    <div>
                        <button class="call-btn" data-id="${u.id}" data-name="${u.username}" data-type="audio">🎤</button>
                        <button class="call-btn" data-id="${u.id}" data-name="${u.username}" data-type="video">📹</button>
                    </div>
                </div>
            `).join('');
            attachUserEvents();
        }

        function attachUserEvents() {
            document.querySelectorAll('.user-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    if(e.target.classList.contains('call-btn')) return;
                    const id = card.dataset.id;
                    const name = card.dataset.name;
                    openChat(id, name);
                });
            });
            document.querySelectorAll('.call-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const toId = btn.dataset.id;
                    const toName = btn.dataset.name;
                    const type = btn.dataset.type;
                    startCall(toId, toName, type);
                });
            });
        }

        function openChat(userId, username) {
            currentChatUser = { id: userId, name: username };
            document.getElementById('chatUsername').innerHTML = username;
            document.getElementById('msgInput').disabled = false;
            document.getElementById('sendMsgBtn').disabled = false;
            document.getElementById('chatMessages').innerHTML = '';
            loadMessagesHistory(userId);
            loadPinnedMessages(userId);
        }

        async function loadMessagesHistory(otherId) {
            const res = await fetch(`/api/messages/${currentUser.userId}/${otherId}`);
            const data = await res.json();
            data.messages.forEach(msg => addMessageToDom(msg, msg.from_id === currentUser.userId));
        }

        function sendMessage() {
            const text = document.getElementById('msgInput').value.trim();
            if(!text || !currentChatUser) return;
            socket.emit('message', { to: currentChatUser.id, text });
            document.getElementById('msgInput').value = '';
            showToast('Сообщение отправлено');
        }
        document.getElementById('sendMsgBtn').onclick = sendMessage;
        document.getElementById('msgInput').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

        // --- Закреп сообщений (без ограничений) ---
        window.pinMessage = (msgId) => {
            if(!currentChatUser) return;
            if(!pinnedStore[currentChatUser.id]) pinnedStore[currentChatUser.id] = [];
            if(!pinnedStore[currentChatUser.id].includes(msgId)) pinnedStore[currentChatUser.id].push(msgId);
            renderPinnedMessages(currentChatUser.id);
        };

        function renderPinnedMessages(chatId) {
            const bar = document.getElementById('pinnedMessagesBar');
            let pins = pinnedStore[chatId] || [];
            bar.innerHTML = pins.map(pid => `<div class="pin-item">📌 Закреплено</div>`).join('');
        }

        function loadPinnedMessages(chatId) { renderPinnedMessages(chatId); }

        // --- Заметки ---
        async function loadNotes() {
            const res = await fetch(`/api/notes/${currentUser.userId}`);
            const data = await res.json();
            const container = document.getElementById('notesList');
            container.innerHTML = data.notes.map(n => `<div style="background:#2c2c34; margin:6px 0; padding:8px; border-radius:14px;color:white"><b>${escapeHtml(n.title)}</b><br>${escapeHtml(n.content)}</div>`).join('');
        }
        document.getElementById('createNoteBtn').onclick = async () => {
            const title = document.getElementById('noteTitle').value;
            const content = document.getElementById('noteContent').value;
            if(!title.trim()) return;
            await fetch('/api/create-note', { method: 'POST', headers: { 'Content-Type':'application/json' }, body: JSON.stringify({ userId: currentUser.userId, title, content }) });
            document.getElementById('noteTitle').value = ''; document.getElementById('noteContent').value = '';
            loadNotes();
        };

        // --- Настройки ---
        document.getElementById('avatarUpload').onchange = async (e) => {
            const file = e.target.files[0];
            const formData = new FormData();
            formData.append('avatar', file);
            formData.append('userId', currentUser.userId);
            const res = await fetch('/api/upload-avatar', { method: 'POST', body: formData });
            const data = await res.json();
            if(data.success) document.getElementById('avatarImg').src = data.avatar;
        };
        document.getElementById('anonymousMode').onchange = (e) => { anonymousMode = e.target.checked; };
        document.getElementById('wallColor').oninput = (e) => { document.getElementById('chatMain').style.background = e.target.value; document.getElementById('chatMain').style.backgroundImage = 'none'; localStorage.removeItem('wallpaper'); };

        // --- Заглушка звонков ---
        window.startCall = (toId, toName, type) => { alert(`📞 ${type === 'audio' ? 'Аудиозвонок' : 'Видеозвонок'} для ${toName}`); };
        function startCall(toId, toName, type) { alert(`📞 ${type} звонок для ${toName}`); }

        // --- Навигация панелей ---
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
                document.getElementById(btn.dataset.panel + 'Panel').style.display = 'flex';
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                if(btn.dataset.panel === 'notes') loadNotes();
            };
        });

        function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; return m;}); }
        generateCaptcha();
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Мессенджер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); height: 100vh; overflow: hidden; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        .login-screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; justify-content: center; align-items: center; z-index: 1000; animation: fadeIn 0.5s ease; }
        .login-box { background: rgba(255,255,255,0.95); padding: 40px; border-radius: 30px; width: 90%; max-width: 380px; text-align: center; backdrop-filter: blur(10px); box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .login-box h1 { margin-bottom: 10px; color: #333; font-size: 28px; }
        .login-box p { color: #666; margin-bottom: 20px; }
        .login-box input { width: 100%; padding: 14px; margin: 10px 0; border: 2px solid #e0e0e0; border-radius: 15px; font-size: 16px; transition: all 0.3s; }
        .login-box input:focus { outline: none; border-color: #667eea; transform: scale(1.02); }
        .login-box button { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 15px; font-size: 16px; font-weight: bold; cursor: pointer; transition: transform 0.2s; }
        .login-box button:hover { transform: translateY(-2px); }
        .tab { display: inline-block; width: 50%; padding: 12px; cursor: pointer; font-size: 16px; font-weight: 500; transition: all 0.3s; }
        .tab.active { border-bottom: 3px solid #667eea; color: #667eea; }
        .form { display: none; animation: fadeIn 0.3s ease; }
        .form.active { display: block; }
        .error { color: #e74c3c; margin-top: 10px; font-size: 14px; }
        
        .app { display: flex; height: 100vh; animation: fadeIn 0.5s ease; }
        @media (max-width: 768px) { .app { flex-direction: column; } .sidebar { width: 100%; max-height: 45%; border-bottom: 1px solid #0f3460; } .chat-area { flex: 1; } }
        
        .sidebar { width: 320px; background: #16213e; color: white; display: flex; flex-direction: column; overflow-y: auto; box-shadow: 2px 0 10px rgba(0,0,0,0.2); }
        .user-header { padding: 15px; background: linear-gradient(135deg, #0f3460, #16213e); display: flex; align-items: center; gap: 12px; position: sticky; top: 0; }
        .user-avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; cursor: pointer; transition: transform 0.3s; border: 2px solid #667eea; }
        .user-avatar:hover { transform: scale(1.05); }
        .user-info { flex: 1; }
        .user-name { font-size: 16px; font-weight: bold; }
        .user-status { font-size: 11px; opacity: 0.7; }
        .logout-btn { background: rgba(255,255,255,0.1); border: none; color: white; font-size: 18px; cursor: pointer; width: 35px; height: 35px; border-radius: 50%; transition: all 0.3s; }
        .logout-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.1); }
        
        .nav-tabs { display: flex; background: #0f3460; padding: 5px; }
        .nav-tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; border-radius: 10px; transition: all 0.3s; font-size: 14px; }
        .nav-tab.active { background: #667eea; }
        .panel { display: none; padding: 15px; flex: 1; overflow-y: auto; }
        .panel.active { display: block; }
        .section-title { font-size: 12px; opacity: 0.7; margin: 10px 0 5px; letter-spacing: 1px; }
        
        .friend-item, .group-item, .channel-item { padding: 10px; margin: 6px 0; background: rgba(255,255,255,0.05); border-radius: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: all 0.3s; }
        .friend-item:hover, .group-item:hover, .channel-item:hover { background: rgba(255,255,255,0.1); transform: translateX(5px); }
        .item-info { display: flex; align-items: center; gap: 10px; }
        .item-avatar { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; background: #667eea; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .item-name { font-weight: 500; font-size: 14px; }
        .online-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-left: 6px; }
        .online-dot.online { background: #4CAF50; box-shadow: 0 0 5px #4CAF50; }
        .online-dot.offline { background: #666; }
        .verified-badge { color: #FFD700; margin-left: 5px; font-size: 12px; }
        .unread-badge { background: #e74c3c; color: white; border-radius: 20px; padding: 2px 8px; font-size: 11px; font-weight: bold; animation: pulse 0.5s; }
        
        .create-form { display: flex; gap: 8px; margin-top: 10px; }
        .create-form input { flex: 1; padding: 8px; border: none; border-radius: 10px; background: rgba(255,255,255,0.1); color: white; outline: none; }
        .create-form button { padding: 8px 12px; background: #4CAF50; border: none; border-radius: 10px; color: white; cursor: pointer; }
        
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #f5f5f5; }
        .chat-header { background: white; padding: 12px 16px; border-bottom: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .chat-with { font-size: 16px; font-weight: 600; color: #333; display: flex; align-items: center; gap: 8px; }
        .call-buttons { display: flex; gap: 8px; }
        .call-btn { padding: 6px 12px; background: #667eea; border: none; border-radius: 20px; color: white; cursor: pointer; font-size: 13px; transition: all 0.3s; }
        .call-btn:hover { transform: scale(1.05); }
        
        .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 80%; padding: 10px 14px; border-radius: 18px; animation: fadeIn 0.3s ease; position: relative; }
        @media (min-width: 768px) { .message { max-width: 65%; } }
        .message.own { background: linear-gradient(135deg, #667eea, #764ba2); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .message.other { background: white; color: #333; align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .message-text { word-wrap: break-word; font-size: 14px; line-height: 1.4; }
        .message-time { font-size: 9px; margin-top: 4px; opacity: 0.6; display: flex; justify-content: flex-end; gap: 6px; }
        
        .file-attachment { display: flex; align-items: center; gap: 10px; padding: 8px; background: rgba(0,0,0,0.05); border-radius: 12px; cursor: pointer; margin-top: 5px; }
        .file-icon { font-size: 24px; }
        .file-info { flex: 1; font-size: 12px; }
        .file-name { font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px; }
        .message-image { max-width: 200px; max-height: 200px; border-radius: 12px; cursor: pointer; margin-top: 5px; }
        
        .typing { padding: 8px 16px; font-size: 11px; color: #666; font-style: italic; min-height: 36px; background: white; border-top: 1px solid #eee; }
        
        .input-area { display: flex; padding: 12px; background: white; gap: 8px; align-items: center; flex-wrap: wrap; border-top: 1px solid #e0e0e0; }
        .input-main { display: flex; flex: 1; gap: 8px; align-items: center; }
        .input-area input { flex: 1; padding: 10px 14px; border: 2px solid #e0e0e0; border-radius: 25px; font-size: 14px; transition: all 0.3s; }
        .input-area input:focus { outline: none; border-color: #667eea; }
        .input-area button { padding: 10px 16px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 25px; cursor: pointer; font-size: 14px; transition: all 0.3s; }
        .input-area button:hover { transform: scale(1.05); }
        .icon-btn { background: none; border: none; font-size: 20px; cursor: pointer; padding: 8px; border-radius: 50%; transition: all 0.2s; }
        .icon-btn:hover { background: rgba(0,0,0,0.1); transform: scale(1.1); }
        
        .image-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); z-index: 3000; display: none; align-items: center; justify-content: center; }
        .image-modal.active { display: flex; }
        .image-modal img { max-width: 90%; max-height: 90%; border-radius: 10px; }
        .close-image { position: absolute; top: 20px; right: 20px; background: white; width: 40px; height: 40px; border-radius: 50%; border: none; font-size: 20px; cursor: pointer; }
        
        .call-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none; align-items: center; justify-content: center; flex-direction: column; animation: fadeIn 0.3s ease; }
        .call-modal.active { display: flex; }
        .call-card { background: linear-gradient(135deg, #1a1a2e, #16213e); border-radius: 40px; padding: 30px; width: 90%; max-width: 350px; text-align: center; color: white; }
        .call-avatar { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 15px; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; font-size: 40px; }
        .caller-name { font-size: 24px; margin-bottom: 8px; }
        .call-status { font-size: 13px; opacity: 0.8; margin-bottom: 25px; }
        .call-actions { display: flex; justify-content: center; gap: 25px; }
        .call-action { width: 60px; height: 60px; border-radius: 50%; border: none; font-size: 26px; cursor: pointer; transition: all 0.2s; }
        .call-action:hover { transform: scale(1.1); }
        .accept { background: #4CAF50; color: white; }
        .decline { background: #e74c3c; color: white; }
        .end { background: #e74c3c; color: white; }
        .minimize { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.2); width: 40px; height: 40px; border-radius: 50%; border: none; color: white; font-size: 18px; cursor: pointer; }
        
        .video-container { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; margin: 20px 0; }
        .video-box { width: 45%; min-width: 140px; background: #000; border-radius: 12px; overflow: hidden; position: relative; }
        .video-box video { width: 100%; height: auto; background: #000; }
        .video-label { position: absolute; bottom: 8px; left: 8px; background: rgba(0,0,0,0.6); padding: 3px 8px; border-radius: 8px; font-size: 10px; }
        
        .hidden { display: none; }
        .no-chat { display: flex; align-items: center; justify-content: center; height: 100%; color: #999; text-align: center; padding: 20px; font-size: 14px; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #667eea; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <h1>💬 Мессенджер</h1>
            <p>Файлы, группы, каналы, звонки</p>
            <div>
                <div class="tab active" onclick="showTab('login')">Вход</div>
                <div class="tab" onclick="showTab('register')">Регистрация</div>
            </div>
            <div id="loginForm" class="form active">
                <input type="text" id="loginUsername" placeholder="Никнейм">
                <input type="password" id="loginPassword" placeholder="Пароль">
                <button onclick="login()">Войти</button>
                <div id="loginError" class="error"></div>
            </div>
            <div id="registerForm" class="form">
                <input type="text" id="regUsername" placeholder="Никнейм (3+ символов)">
                <input type="password" id="regPassword" placeholder="Пароль (4+ символов)">
                <input type="text" id="inviteCode" placeholder="Код: FRIEND2024">
                <button onclick="register()">Зарегистрироваться</button>
                <div id="regError" class="error"></div>
            </div>
        </div>
    </div>

    <div id="app" class="app hidden">
        <div class="sidebar">
            <div class="user-header">
                <img id="myAvatar" class="user-avatar" src="/avatars/default.png" onclick="document.getElementById('avatarInput').click()">
                <div class="user-info">
                    <div class="user-name" id="myName"></div>
                    <div class="user-status">🟢 Онлайн</div>
                </div>
                <button class="logout-btn" onclick="logout()">🚪</button>
            </div>
            <input type="file" id="avatarInput" style="display:none" accept="image/*" onchange="uploadAvatar(this)">
            
            <div class="nav-tabs">
                <div class="nav-tab active" onclick="switchPanel('chats')">💬 Чаты</div>
                <div class="nav-tab" onclick="switchPanel('groups')">👥 Группы</div>
                <div class="nav-tab" onclick="switchPanel('channels')">📢 Каналы</div>
                <div class="nav-tab" onclick="switchPanel('notes')">📝 Заметки</div>
            </div>
            
            <div id="chatsPanel" class="panel active">
                <div class="section-title">👥 ДРУЗЬЯ (<span id="friendsCount">0</span>)</div>
                <div id="friendsContainer"></div>
                <div class="add-friend" style="display:flex; gap:8px; margin-top:10px">
                    <input type="text" id="friendName" placeholder="Ник друга" style="flex:1; padding:8px; border-radius:10px; border:none">
                    <button onclick="addFriend()" style="background:#4CAF50; border:none; border-radius:10px; padding:8px 15px; color:white; cursor:pointer">➕</button>
                </div>
            </div>
            
            <div id="groupsPanel" class="panel">
                <div class="section-title">👥 МОИ ГРУППЫ</div>
                <div id="groupsContainer"></div>
                <div class="create-form">
                    <input type="text" id="newGroupName" placeholder="Название группы">
                    <button onclick="createGroup()">➕ Создать</button>
                </div>
                <div class="create-form" style="margin-top:5px">
                    <input type="text" id="addToGroupInput" placeholder="Ник для добавления">
                    <button onclick="addToGroup()">👥 Добавить</button>
                </div>
            </div>
            
            <div id="channelsPanel" class="panel">
                <div class="section-title">📢 КАНАЛЫ</div>
                <div id="channelsContainer"></div>
                <div id="createChannelForm" style="display:none" class="create-form">
                    <input type="text" id="channelName" placeholder="Название канала">
                    <input type="text" id="channelDesc" placeholder="Описание">
                    <button onclick="createChannel()">✅</button>
                </div>
            </div>
            
            <div id="notesPanel" class="panel">
                <div class="create-form" style="margin-bottom:10px">
                    <input type="text" id="noteTitle" placeholder="Заголовок">
                    <button onclick="createNote()">➕</button>
                </div>
                <div id="notesContainer"></div>
            </div>
        </div>
        
        <div class="chat-area">
            <div class="chat-header">
                <div class="chat-with" id="chatWith">💬 Выберите чат</div>
                <div class="call-buttons" id="callBtns" style="display:none">
                    <button class="call-btn" onclick="startCall('audio')">🎤 Аудио</button>
                    <button class="call-btn" onclick="startCall('video')">📹 Видео</button>
                </div>
            </div>
            <div id="messagesArea" class="messages"><div class="no-chat">👈 Выберите чат слева</div></div>
            <div id="typingIndicator" class="typing"></div>
            <div class="input-area">
                <div class="input-main">
                    <button class="icon-btn" onclick="document.getElementById('fileInput').click()">📎</button>
                    <input type="file" id="fileInput" style="display:none" onchange="uploadFile(this)">
                    <input type="text" id="messageInput" placeholder="Сообщение..." disabled>
                    <button onclick="sendMessage()" id="sendBtn" disabled>📤</button>
                </div>
            </div>
        </div>
    </div>

    <div id="callModal" class="call-modal">
        <button class="minimize" onclick="minimizeCall()">🗕</button>
        <div class="call-card">
            <div class="call-avatar" id="callAvatar">📞</div>
            <div class="caller-name" id="callerName"></div>
            <div class="call-status" id="callStatus">Звонит...</div>
            <div id="callVideoContainer" class="video-container" style="display:none">
                <div class="video-box"><video id="localVideo" autoplay muted playsinline></video><div class="video-label">Вы</div></div>
                <div class="video-box"><video id="remoteVideo" autoplay playsinline></video><div class="video-label">Собеседник</div></div>
            </div>
            <div class="call-actions" id="callActions">
                <button class="call-action accept" onclick="acceptCall()">✅</button>
                <button class="call-action decline" onclick="declineCall()">❌</button>
            </div>
            <div class="call-actions" id="callControls" style="display:none">
                <button class="call-action" onclick="toggleMic()">🎤</button>
                <button class="call-action" onclick="toggleVideo()">📷</button>
                <button class="call-action end" onclick="endCall()">📞</button>
            </div>
        </div>
    </div>

    <div id="imageModal" class="image-modal">
        <button class="close-image" onclick="closeImageViewer()">✖</button>
        <img id="viewImage" src="">
    </div>

    <audio id="ringtone" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" preload="auto"></audio>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket, currentUser, currentChat = null;
        let typingTimeout;
        let peerConnection, localStream, currentCall = null;
        
        const config = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
                { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' }
            ]
        };
        
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
            if (tab === 'login') {
                document.querySelector('.tab').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
        }
        
        function switchPanel(panel) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            if (panel === 'chats') { document.querySelector('.nav-tab').classList.add('active'); document.getElementById('chatsPanel').classList.add('active'); loadFriends(); }
            if (panel === 'groups') { document.querySelectorAll('.nav-tab')[1].classList.add('active'); document.getElementById('groupsPanel').classList.add('active'); loadGroups(); }
            if (panel === 'channels') { document.querySelectorAll('.nav-tab')[2].classList.add('active'); document.getElementById('channelsPanel').classList.add('active'); loadChannels(); }
            if (panel === 'notes') { document.querySelectorAll('.nav-tab')[3].classList.add('active'); document.getElementById('notesPanel').classList.add('active'); loadNotes(); }
        }
        
        async function register() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const inviteCode = document.getElementById('inviteCode').value.trim();
            const res = await fetch('/api/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password, inviteCode }) });
            const data = await res.json();
            if (data.error) document.getElementById('regError').innerText = data.error;
            else { alert('Регистрация успешна! Войдите.'); showTab('login'); document.getElementById('loginUsername').value = username; }
        }
        
        async function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
            const data = await res.json();
            if (data.error) document.getElementById('loginError').innerText = data.error;
            else {
                currentUser = data;
                document.getElementById('myName').innerText = data.username;
                if (data.avatar && data.avatar !== '/avatars/default.png') document.getElementById('myAvatar').src = data.avatar + '?t=' + Date.now();
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                if (data.role === 'owner') document.getElementById('createChannelForm').style.display = 'flex';
                connectSocket();
                loadFriends(); loadGroups(); loadChannels(); loadNotes();
            }
        }
        
        function logout() { location.reload(); }
        
        async function uploadAvatar(input) {
            const file = input.files[0];
            const formData = new FormData();
            formData.append('avatar', file);
            formData.append('userId', currentUser.userId);
            const res = await fetch('/api/upload-avatar', { method: 'POST', body: formData });
            const data = await res.json();
            if (data.success) document.getElementById('myAvatar').src = data.avatar + '?t=' + Date.now();
        }
        
        async function uploadFile(input) {
            const file = input.files[0];
            if (!file || !currentChat) return;
            const formData = new FormData();
            formData.append('file', file);
            const res = await fetch('/api/upload-file', { method: 'POST', body: formData });
            const data = await res.json();
            if (data.success && socket) {
                if (currentChat.type === 'user') {
                    socket.emit('message', { to: currentChat.id, file: data.url, fileType: data.isImage ? 'image' : 'file', text: null });
                    addMessageToChat(null, data.url, data.isImage, data.name, new Date().toLocaleTimeString(), true);
                } else if (currentChat.type === 'group') {
                    socket.emit('group-message', { groupId: currentChat.id, file: data.url, fileType: data.isImage ? 'image' : 'file', text: null });
                }
            }
            input.value = '';
        }
        
        function openImage(url) { document.getElementById('viewImage').src = url; document.getElementById('imageModal').classList.add('active'); }
        function closeImageViewer() { document.getElementById('imageModal').classList.remove('active'); }
        
        async function loadFriends() {
            const res = await fetch(`/api/users/${currentUser.userId}`);
            const data = await res.json();
            document.getElementById('friendsCount').innerText = data.users.length;
            const container = document.getElementById('friendsContainer');
            if (data.users.length === 0) container.innerHTML = '<div style="padding:20px;text-align:center;opacity:0.6">Нет друзей</div>';
            else container.innerHTML = data.users.map(u => `<div class="friend-item" onclick="openChat('user', '${u.id}', '${u.username}', '${u.avatar || ''}')"><div class="item-info"><img class="item-avatar" src="${u.avatar || '/avatars/default.png'}"><span class="item-name">${u.username}</span><span class="online-dot ${u.online ? 'online' : 'offline'}"></span></div><span class="unread-badge" style="display:none">0</span></div>`).join('');
        }
        
        async function addFriend() {
            const username = document.getElementById('friendName').value.trim();
            if (!username) return;
            alert(`Заявка отправлена ${username}`);
            document.getElementById('friendName').value = '';
        }
        
        async function loadGroups() {
            const res = await fetch(`/api/groups/${currentUser.userId}`);
            const data = await res.json();
            const container = document.getElementById('groupsContainer');
            if (data.groups.length === 0) container.innerHTML = '<div style="padding:20px;text-align:center;opacity:0.6">Нет групп</div>';
            else container.innerHTML = data.groups.map(g => `<div class="group-item" onclick="openChat('group', '${g.id}', '${g.name}', '')"><div class="item-info"><div class="item-avatar">👥</div><span class="item-name">${g.name}</span><span style="font-size:11px;opacity:0.6">${g.members} уч.</span></div></div>`).join('');
        }
        
        async function createGroup() {
            const name = document.getElementById('newGroupName').value.trim();
            if (!name) return;
            const res = await fetch('/api/create-group', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, userId: currentUser.userId }) });
            const data = await res.json();
            if (data.success) { alert('Группа создана'); document.getElementById('newGroupName').value = ''; loadGroups(); }
        }
        
        async function addToGroup() {
            const username = document.getElementById('addToGroupInput').value.trim();
            if (!username || !currentChat || currentChat.type !== 'group') return;
            const res = await fetch('/api/add-to-group', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ groupId: currentChat.id, username }) });
            const data = await res.json();
            if (data.error) alert(data.error);
            else alert('Пользователь добавлен в группу');
            document.getElementById('addToGroupInput').value = '';
        }
        
        async function loadChannels() {
            const res = await fetch('/api/channels');
            const data = await res.json();
            const container = document.getElementById('channelsContainer');
            if (data.channels.length === 0) container.innerHTML = '<div style="padding:20px;text-align:center;opacity:0.6">Нет каналов</div>';
            else container.innerHTML = data.channels.map(c => `<div class="channel-item" onclick="openChat('channel', '${c.id}', '${c.name}', '')"><div class="item-info"><div class="item-avatar">📢</div><span class="item-name">${c.name} ${c.verified ? '<span class="verified-badge">✅</span>' : ''}</span></div><span style="font-size:11px">${c.subscribers || 0} подп.</span></div>`).join('');
        }
        
        async function createChannel() {
            const name = document.getElementById('channelName').value.trim();
            const desc = document.getElementById('channelDesc').value.trim();
            if (!name) return;
            const res = await fetch('/api/create-channel', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, description: desc, userId: currentUser.userId }) });
            const data = await res.json();
            if (data.error) alert(data.error);
            else { alert('Канал создан'); document.getElementById('channelName').value = ''; document.getElementById('channelDesc').value = ''; loadChannels(); }
        }
        
        async function loadNotes() {
            const res = await fetch(`/api/notes/${currentUser.userId}`);
            const data = await res.json();
            const container = document.getElementById('notesContainer');
            if (data.notes.length === 0) container.innerHTML = '<div style="text-align:center;opacity:0.6">Нет заметок</div>';
            else container.innerHTML = data.notes.map(n => `<div style="background:${n.color}; padding:12px; border-radius:12px; margin-bottom:10px"><div style="display:flex; justify-content:space-between"><b>${escapeHtml(n.title)}</b><div><button onclick="pinNote('${n.id}', ${n.pinned ? 0 : 1})" style="background:none;border:none;cursor:pointer">${n.pinned ? '📌' : '📍'}</button><button onclick="deleteNote('${n.id}')" style="background:none;border:none;cursor:pointer">🗑️</button></div></div><div style="font-size:13px; margin-top:8px">${escapeHtml(n.content)}</div></div>`).join('');
        }
        
        async function createNote() {
            const title = document.getElementById('noteTitle').value.trim();
            if (!title) return;
            await fetch('/api/create-note', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId: currentUser.userId, title, content: '', color: '#2d2d5e' }) });
            document.getElementById('noteTitle').value = ''; loadNotes();
        }
        
        async function pinNote(noteId, pinned) { await fetch('/api/pin-note', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ noteId, pinned }) }); loadNotes(); }
        async function deleteNote(noteId) { if (confirm('Удалить заметку?')) { await fetch('/api/delete-note', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ noteId }) }); loadNotes(); } }
        
        function openChat(type, id, name, avatar) {
            currentChat = { type, id, name, avatar };
            document.getElementById('chatWith').innerHTML = type === 'user' ? `💬 ${name}` : (type === 'group' ? `👥 ${name}` : `📢 ${name}`);
            document.getElementById('callBtns').style.display = type === 'user' ? 'flex' : 'none';
            document.getElementById('messageInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('messagesArea').innerHTML = '';
            loadMessages();
        }
        
        async function loadMessages() {
            if (!currentChat) return;
            let url = '';
            if (currentChat.type === 'user') url = `/api/messages/${currentUser.userId}/${currentChat.id}`;
            else if (currentChat.type === 'group') url = `/api/group-messages/${currentChat.id}`;
            else url = `/api/channel-messages/${currentChat.id}`;
            const res = await fetch(url);
            const data = await res.json();
            const container = document.getElementById('messagesArea');
            container.innerHTML = '';
            if (data.messages.length === 0) container.innerHTML = '<div class="no-chat">💬 Напишите первое сообщение!</div>';
            else data.messages.forEach(msg => {
                const isOwn = msg.from_id === currentUser.userId;
                addMessageToChat(msg.text, msg.file, msg.type === 'image', null, msg.time, isOwn);
            });
            scrollToBottom();
        }
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentChat || !socket) return;
            if (currentChat.type === 'user') {
                socket.emit('message', { to: currentChat.id, text, file: null });
                addMessageToChat(text, null, false, null, new Date().toLocaleTimeString(), true);
            } else if (currentChat.type === 'group') {
                socket.emit('group-message', { groupId: currentChat.id, text, file: null });
            } else if (currentChat.type === 'channel') {
                socket.emit('channel-message', { channelId: currentChat.id, text });
            }
            input.value = '';
        }
        
        function addMessageToChat(text, fileUrl, isImage, fileName, time, isOwn) {
            const container = document.getElementById('messagesArea');
            if (container.querySelector('.no-chat')) container.innerHTML = '';
            const div = document.createElement('div');
            div.className = `message ${isOwn ? 'own' : 'other'}`;
            let content = '';
            if (text) content = `<div class="message-text">${escapeHtml(text)}</div>`;
            else if (fileUrl) {
                if (isImage) content = `<img src="${fileUrl}" class="message-image" onclick="openImage('${fileUrl}')">`;
                else content = `<div class="file-attachment" onclick="window.open('${fileUrl}')"><div class="file-icon">📎</div><div class="file-info"><div class="file-name">${fileName || 'Файл'}</div></div></div>`;
            }
            div.innerHTML = `${content}<div class="message-time">${time}</div>`;
            container.appendChild(div);
            scrollToBottom();
        }
        
        function scrollToBottom() { const c = document.getElementById('messagesArea'); c.scrollTop = c.scrollHeight; }
        
        // ========== ЗВОНКИ ==========
        async function startCall(type) {
            if (!currentChat || currentChat.type !== 'user') { alert('Выберите пользователя'); return; }
            try {
                if (type === 'video') localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                else localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                peerConnection = new RTCPeerConnection(config);
                localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
                peerConnection.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];
                peerConnection.onicecandidate = e => { if (e.candidate) socket.emit('ice-candidate', { toUserId: currentChat.id, candidate: e.candidate }); };
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                socket.emit('call-user', { toUserId: currentChat.id, offer, type });
                currentCall = { type, toId: currentChat.id };
                document.getElementById('callerName').innerHTML = currentChat.name;
                document.getElementById('callStatus').innerHTML = 'Звоним...';
                document.getElementById('callActions').style.display = 'flex';
                document.getElementById('callControls').style.display = 'none';
                document.getElementById('callVideoContainer').style.display = type === 'video' ? 'flex' : 'none';
                if (type === 'video') document.getElementById('localVideo').srcObject = localStream;
                document.getElementById('callModal').classList.add('active');
            } catch(e) { alert('Нет доступа к камере/микрофону'); }
        }
        
        async function acceptCall() {
            if (!currentCall) return;
            try {
                if (currentCall.type === 'video') localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                else localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                peerConnection = new RTCPeerConnection(config);
                localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
                peerConnection.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];
                peerConnection.onicecandidate = e => { if (e.candidate) socket.emit('ice-candidate', { toUserId: currentCall.fromId, candidate: e.candidate }); };
                await peerConnection.setRemoteDescription(new RTCSessionDescription(currentCall.offer));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                socket.emit('answer-call', { toUserId: currentCall.fromId, answer });
                document.getElementById('callStatus').innerHTML = 'В разговоре...';
                document.getElementById('callActions').style.display = 'none';
                document.getElementById('callControls').style.display = 'flex';
                if (currentCall.type === 'video') {
                    document.getElementById('localVideo').srcObject = localStream;
                    document.getElementById('callVideoContainer').style.display = 'flex';
                }
            } catch(e) { console.error(e); }
        }
        
        function declineCall() { if (currentCall) { socket.emit('end-call', { toUserId: currentCall.fromId }); closeCallModal(); } }
        function endCall() { if (localStream) localStream.getTracks().forEach(t => t.stop()); if (peerConnection) peerConnection.close(); if (currentCall) socket.emit('end-call', { toUserId: currentCall.fromId || currentCall.toId }); closeCallModal(); peerConnection = null; localStream = null; }
        function minimizeCall() { document.getElementById('callModal').classList.remove('active'); }
        function toggleMic() { if (localStream) { const t = localStream.getAudioTracks()[0]; if (t) t.enabled = !t.enabled; } }
        function toggleVideo() { if (localStream) { const t = localStream.getVideoTracks()[0]; if (t) t.enabled = !t.enabled; } }
        function closeCallModal() { document.getElementById('callModal').classList.remove('active'); document.getElementById('callVideoContainer').style.display = 'none'; if (document.getElementById('remoteVideo')) document.getElementById('remoteVideo').srcObject = null; }
        
        function connectSocket() {
            socket = io();
            socket.emit('login', { userId: currentUser.userId, username: currentUser.username, avatar: currentUser.avatar });
            
            socket.on('new-message', (data) => {
                if (currentChat && currentChat.type === 'user' && data.from === currentChat.id) {
                    addMessageToChat(data.text, data.file, data.fileType === 'image', null, data.time, false);
                }
            });
            socket.on('new-group-message', (data) => {
                if (currentChat && currentChat.type === 'group' && data.groupId === currentChat.id) {
                    addMessageToChat(data.text, data.file, data.fileType === 'image', null, data.time, false);
                }
            });
            socket.on('new-channel-message', (data) => {
                if (currentChat && currentChat.type === 'channel' && data.channelId === currentChat.id) {
                    addMessageToChat(data.text, null, false, null, data.time, false);
                }
            });
            socket.on('typing', (data) => { document.getElementById('typingIndicator').innerHTML = `${data.from} печатает...`; clearTimeout(typingTimeout); typingTimeout = setTimeout(() => document.getElementById('typingIndicator').innerHTML = '', 2000); });
            socket.on('online-list', () => { loadFriends(); loadGroups(); });
            
            socket.on('incoming-call', (data) => {
                currentCall = { fromId: data.fromId, fromName: data.fromName, offer: data.offer, type: data.type };
                document.getElementById('callerName').innerHTML = data.fromName;
                document.getElementById('callStatus').innerHTML = 'Входящий звонок...';
                document.getElementById('callActions').style.display = 'flex';
                document.getElementById('callControls').style.display = 'none';
                document.getElementById('callModal').classList.add('active');
                const ringtone = document.getElementById('ringtone');
                if (ringtone) ringtone.play().catch(e => console.log);
            });
            socket.on('call-answered', async (data) => { if (peerConnection) { await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer)); document.getElementById('callStatus').innerHTML = 'В разговоре...'; document.getElementById('callActions').style.display = 'none'; document.getElementById('callControls').style.display = 'flex'; } });
            socket.on('ice-candidate', async (data) => { if (peerConnection) { try { await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate)); } catch(e) {} } });
            socket.on('call-ended', () => endCall());
        }
        
        document.getElementById('messageInput').addEventListener('input', () => { if (socket && currentChat && currentChat.type === 'user') socket.emit('typing', { to: currentChat.id, name: currentUser.username }); });
        
        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
    </script>
</body>
</html>
